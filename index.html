<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LOGOS · 常青藤级自学训练系统</title>
  <style>
    :root{
      --bg:#f8fafc;
      --card:#ffffff;
      --line:#e2e8f0;
      --text:#0f172a;
      --muted:#64748b;
      --muted2:#94a3b8;
      --blue:#1d4ed8;
      --green:#16a34a;
      --amber:#d97706;
      --red:#dc2626;
      --purple:#7c3aed;
      --shadow:0 1px 3px rgba(0,0,0,.05),0 12px 30px rgba(15,23,42,.05);
      --radius:14px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body,#app{height:100%;margin:0}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    button,input,textarea,select{font:inherit}
    button{cursor:pointer}
    .topbar{
      position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid var(--line);
      padding:12px 16px calc(12px + env(safe-area-inset-top));box-shadow:0 1px 0 rgba(0,0,0,.03)
    }
    .topbar-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px}
    .brand{display:flex;align-items:baseline;gap:10px}
    .brand-logo{font-size:22px;font-weight:900;letter-spacing:.18em;color:var(--blue)}
    .brand-sub{font-size:12px;color:var(--muted2)}
    .stats{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .pill{
      padding:5px 10px;border:1px solid var(--line);border-radius:999px;background:#fff;
      font-size:12px;color:var(--muted)
    }
    .nav{
      position:sticky;top:68px;z-index:40;background:#fff;border-bottom:1px solid var(--line);
      overflow:auto;white-space:nowrap
    }
    .nav-inner{max-width:1200px;margin:0 auto;display:flex}
    .tab{
      border:none;background:none;padding:12px 14px;font-size:12px;color:var(--muted);
      border-bottom:2px solid transparent;flex-shrink:0
    }
    .tab.active{color:var(--blue);border-bottom-color:var(--blue);background:#eff6ff}
    .container{max-width:1200px;margin:0 auto;padding:16px}
    .page-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px}
    .page-title{font-size:24px;font-weight:900;margin-bottom:4px}
    .page-sub{font-size:12px;color:var(--muted2);line-height:1.7}
    .grid{display:grid;gap:12px}
    .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    @media (max-width:960px){
      .grid-4{grid-template-columns:repeat(2,minmax(0,1fr))}
      .grid-3{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width:720px){
      .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
      .page-header{flex-direction:column}
      .nav{top:74px}
    }
    .card{
      background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
      padding:14px;box-shadow:var(--shadow)
    }
    .label{
      font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);font-weight:800
    }
    .small{font-size:12px;color:var(--muted)}
    .tiny{font-size:11px;color:var(--muted2)}
    .btn{
      border-radius:10px;padding:8px 14px;border:1px solid var(--line);background:#fff;color:var(--muted)
    }
    .btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
    .btn-green{background:#f0fdf4;border-color:#86efac;color:var(--green)}
    .btn-danger{background:#fef2f2;border-color:#fca5a5;color:var(--red)}
    .btn-sm{padding:5px 10px;font-size:12px}
    .btn-xs{padding:3px 8px;font-size:11px}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap}
    .chip{
      display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;
      border:1px solid var(--line);font-size:11px;color:var(--muted);background:#fff
    }
    .input,.textarea,.select{
      width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#f8fafc;color:var(--text);outline:none
    }
    .textarea{resize:vertical}
    .field{margin-bottom:12px}
    .field-label{
      font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:800;color:var(--muted);margin-bottom:6px
    }
    .row{display:flex;gap:10px;align-items:center}
    .row-between{display:flex;justify-content:space-between;gap:12px;align-items:center}
    .separator{height:1px;background:#f1f5f9;margin:10px 0}
    .progress{height:6px;background:#e9eef5;border-radius:999px;overflow:hidden}
    .progress>div{height:100%;border-radius:999px}
    .empty{text-align:center;color:var(--muted2);padding:28px 12px;font-style:italic}
    .section-title{
      font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--muted);margin:6px 0 8px
    }
    .score-box{text-align:center;padding:10px;border-radius:10px}
    .list-row{display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f1f5f9}
    .list-row:last-child{border-bottom:none}
    .tabs-inline{display:flex;gap:0;border-bottom:1px solid var(--line);overflow:auto;margin-bottom:14px}
    .tab-inline{
      border:none;background:none;padding:10px 14px;font-size:12px;color:var(--muted);white-space:nowrap;border-bottom:2px solid transparent
    }
    .tab-inline.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
    .info{
      background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a;border-radius:12px;padding:12px;line-height:1.75
    }
    .good{
      background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:12px
    }
    .warn{
      background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:12px
    }
    .danger{
      background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:12px
    }
    .modal-backdrop{
      position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;
      z-index:1000;padding:16px
    }
    .modal{
      width:min(820px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:16px;border:1px solid var(--line);box-shadow:0 20px 60px rgba(0,0,0,.18)
    }
    .modal-head{
      display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #f1f5f9;
      position:sticky;top:0;background:#fff;z-index:2
    }
    .modal-title{font-size:16px;font-weight:900}
    .modal-body{padding:16px}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .check{
      width:22px;height:22px;border-radius:8px;border:1px solid #cbd5e1;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0
    }
    .check.done{background:#dcfce7;border-color:#86efac;color:#15803d}
    .muted2{color:var(--muted2)}
    .bar-wrap{display:flex;gap:6px;align-items:flex-end;height:84px;margin-top:10px}
    .bar-item{flex:1;text-align:center}
    .bar{background:#dbeafe;border-radius:4px 4px 0 0;min-height:4px}
    .bar-label{font-size:9px;color:#94a3b8;margin-top:4px}
    .bar-value{font-size:9px;color:#1d4ed8;font-weight:700;margin-top:2px}
    .linklike{color:var(--blue);text-decoration:none}
    .linklike:hover{text-decoration:underline}
  </style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  const STORAGE_KEY = "logos_ivy_v12";
  const WEEKDAYS = ["周日","周一","周二","周三","周四","周五","周六"];

  const REVIEW_TYPES = ["周复盘","月复盘","课程复盘","项目复盘"];
  const PORTFOLIO_TYPES = ["短文","长文","研究提案","注释书目","论证地图","答辩提纲","课程终稿","项目终稿","反思","其他"];
  const RESOURCE_TYPES = ["书籍","论文","文章","视频","讲义","网页","其他"];

  const PROGRAM_PHASES = {
    1:{name:"奠基", color:"#3b82f6", goal:"把模糊思考变成可写出的清晰论证"},
    2:{name:"扩展", color:"#10b981", goal:"进入课程化节奏：阅读、短写作、讨论、修订"},
    3:{name:"深化", color:"#f59e0b", goal:"进入专题研究：问题缩小、文献地图、方法意识"},
    4:{name:"整合", color:"#8b5cf6", goal:"做成长文、答辩、作品集，形成完整成果"}
  };

  const COURSE_TEMPLATES = {
    seminar:{
      label:"讨论写作课",
      desc:"最像顶尖大学的一年级研讨课：持续阅读、连续短写作、反复修订、最后收成课程终稿。",
      assessment:"建议比重：阅读准备15%｜短写作20%｜讨论/答辩15%｜研究性组件20%｜长文20%｜修订10%",
      modules:[
        {title:"问题定义", purpose:"确定这门课到底在追问什么。", reading:"读课程导论或主题总览，写下你现在最关心的 1 个问题。", assignment:"写 300–500 字《我为什么要学这门课》。", aiMode:"苏格拉底追问", deliverable:"问题说明", usage:"先不要追求深度，先把问题缩到一句能说清的话。"},
        {title:"概念澄清", purpose:"把核心词从模糊感觉变成可操作概念。", reading:"列出 3–5 个核心概念，并给出你自己的临时定义。", assignment:"写 1 份概念卡片：概念、定义、边界、例子、反例。", aiMode:"逻辑法官", deliverable:"概念卡片", usage:"重点不是查百科，而是区分‘我以为我懂’和‘我能定义清楚’。"},
        {title:"阅读备忘录", purpose:"训练 close reading，而不是泛泛浏览。", reading:"读 1 篇核心文本，找主张、前提、证据、最弱一环。", assignment:"写 300–600 字阅读备忘录。", aiMode:"苏格拉底追问", deliverable:"阅读备忘录", usage:"只做一件事：把作者的论证拆出来。"},
        {title:"回应短文一", purpose:"从理解进入表态。", reading:"重读前几周文本，选一个争点。", assignment:"写 500–800 字回应短文。", aiMode:"最强反对者", deliverable:"回应短文 1", usage:"只处理一个争点，不要贪大。"},
        {title:"论证地图", purpose:"把争论中的立场关系画出来。", reading:"整理至少 2 个对立立场。", assignment:"做 1 份论证地图：主张—前提—证据—反方。", aiMode:"逻辑法官", deliverable:"论证地图", usage:"这一步是为了防止你只会写，不会拆。"},
        {title:"短文修订", purpose:"进入真正的训练核心：修订。", reading:"对照 AI 批评，找到最致命的 2 个问题。", assignment:"重写回应短文，并附修订说明。", aiMode:"写作外科", deliverable:"修订稿 + 修订说明", usage:"修订不是润色，而是改结构、改推理。"},
        {title:"注释书目", purpose:"从零散阅读进入资料管理。", reading:"找 6–10 条资料，区分支持、反对、中立。", assignment:"写 annotated bibliography。", aiMode:"综合评委", deliverable:"注释书目", usage:"每条资料都要写：它支持什么、限制什么。"},
        {title:"研究问题缩小", purpose:"把大问题缩成可写问题。", reading:"回看前 7 周内容，删掉范围过大的部分。", assignment:"写 1 份研究问题说明。", aiMode:"苏格拉底追问", deliverable:"研究问题说明", usage:"删范围比加范围更重要。"},
        {title:"论文提纲", purpose:"从散点观点变成完整结构。", reading:"列出主张、分论点、证据、反驳。", assignment:"写课程长文提纲。", aiMode:"写作外科", deliverable:"长文提纲", usage:"提纲要能单独成立，不靠灵感。"},
        {title:"论文初稿", purpose:"先把完整结构写出来。", reading:"按提纲展开，不求完美。", assignment:"完成课程长文初稿。", aiMode:"综合评委", deliverable:"初稿", usage:"先可批评，再谈优秀。"},
        {title:"答辩与修订", purpose:"用口头答辩检测理解。", reading:"准备最强反方问题。", assignment:"做一次 10–15 分钟口头答辩并重写。", aiMode:"最强反对者", deliverable:"答辩记录 + 二稿", usage:"能说清楚，才算真正掌握。"},
        {title:"终稿与反思", purpose:"用作品集方式收口。", reading:"回看这门课全部产出。", assignment:"交终稿 + 课程反思。", aiMode:"综合评委", deliverable:"课程终稿 + 反思", usage:"最后不是说‘我学了很多’，而是说‘我哪里真的变强了’。"}
      ]
    },
    research:{
      label:"研究方法课",
      desc:"更像中后期专题训练：问题、资料、方法、提案、草稿、答辩、终稿。",
      assessment:"建议比重：问题说明15%｜资料与方法20%｜研究组件25%｜草稿与修订20%｜答辩10%｜反思10%",
      modules:[
        {title:"问题与边界", purpose:"确定研究问题、边界和价值。", reading:"写清楚研究对象、范围、不要研究什么。", assignment:"研究问题说明 300–500 字。", aiMode:"苏格拉底追问", deliverable:"问题说明", usage:"研究最怕题目过大。"},
        {title:"资料池建立", purpose:"建立第一轮资料地图。", reading:"找 10–20 条资料，做初步分类。", assignment:"资料池列表。", aiMode:"综合评委", deliverable:"资料池", usage:"先求广，再筛选。"},
        {title:"方法意识", purpose:"搞清楚你是怎么研究这个问题的。", reading:"区分文本分析、比较分析、案例分析、概念分析。", assignment:"写方法说明。", aiMode:"逻辑法官", deliverable:"方法说明", usage:"方法不是装饰，是你如何得出结论。"},
        {title:"文献图谱", purpose:"看清不同作者之间的关系。", reading:"按立场、方法、结论整理文献。", assignment:"文献图谱。", aiMode:"综合评委", deliverable:"文献图谱", usage:"不要把资料当散点。"},
        {title:"研究提案", purpose:"把问题、资料、方法合成一个计划。", reading:"整合前 4 周材料。", assignment:"完成 proposal。", aiMode:"写作外科", deliverable:"研究提案", usage:"这一步决定后面会不会乱。"},
        {title:"核心争点一", purpose:"集中推进第一个关键争点。", reading:"精读一组核心文献。", assignment:"写研究短文一。", aiMode:"最强反对者", deliverable:"研究短文 1", usage:"一次只打一个关键点。"},
        {title:"核心争点二", purpose:"推进第二个关键争点。", reading:"补充反向材料。", assignment:"写研究短文二。", aiMode:"逻辑法官", deliverable:"研究短文 2", usage:"强迫自己面对反方。"},
        {title:"证据与限制", purpose:"判断你的资料到底能支持到什么程度。", reading:"回看资料链与证据链。", assignment:"写证据限制说明。", aiMode:"综合评委", deliverable:"证据限制说明", usage:"优秀研究不是强行证明，而是知道边界。"},
        {title:"整体提纲", purpose:"把所有材料装进一个结构。", reading:"列出全篇结构。", assignment:"长文提纲。", aiMode:"写作外科", deliverable:"整体提纲", usage:"结构先稳住。"},
        {title:"长文初稿", purpose:"进入完整产出。", reading:"按提纲写出初稿。", assignment:"初稿。", aiMode:"综合评委", deliverable:"初稿", usage:"先完整，再优化。"},
        {title:"答辩与大修", purpose:"用追问逼出薄弱点。", reading:"准备最难的 5 个问题。", assignment:"答辩 + 大修。", aiMode:"最强反对者", deliverable:"答辩记录 + 修订稿", usage:"这一周是拉开水平差距的关键。"},
        {title:"终稿与方法反思", purpose:"让研究闭环。", reading:"回看问题、方法、结论是否一致。", assignment:"终稿 + 方法反思。", aiMode:"综合评委", deliverable:"终稿 + 研究反思", usage:"最后必须能说清：我究竟是怎么做出来的。"}
      ]
    }
  };

  const PROJECT_PHASE_TEMPLATES = [
    {
      key:"define",
      name:"问题定义",
      purpose:"把大问题缩成可研究、可回答、可交付的问题。",
      deliverable:"问题说明 + 边界说明 + 初始主张",
      gate:"达标标准：问题清楚、范围可控、不是空泛口号"
    },
    {
      key:"map",
      name:"资料与立场地图",
      purpose:"把支持/反对/中立材料整理成结构，而不是堆链接。",
      deliverable:"注释书目 + 立场地图 + 资料分类表",
      gate:"达标标准：至少能清楚说出 3 种主要立场及其代表材料"
    },
    {
      key:"build",
      name:"论证搭建",
      purpose:"建立你的主张、分论点、证据链与反驳链。",
      deliverable:"论证地图 + 提纲 + 反驳清单",
      gate:"达标标准：主张明确，证据链可检查，反方不是草人"
    },
    {
      key:"draft",
      name:"初稿与修订",
      purpose:"先形成完整文本，再接受攻击，再重写。",
      deliverable:"初稿 + AI批评记录 + 修订说明 + 二稿",
      gate:"达标标准：至少完成 1 轮结构级修订"
    },
    {
      key:"defend",
      name:"答辩与终稿",
      purpose:"用口头答辩检测理解，用终稿收口，用反思固化方法。",
      deliverable:"口头答辩 + 终稿 + 项目反思",
      gate:"达标标准：能回答强反对意见，终稿与问题设置一致"
    }
  ];

  function uid(prefix="id"){
    return prefix + "_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,7);
  }
  function today(){
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }
  function parseDate(s){ return new Date(String(s) + "T12:00:00"); }
  function fmtDate(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
  function daysDiff(a,b){ return Math.round((parseDate(a)-parseDate(b))/86400000); }
  function safeArray(v){ return Array.isArray(v) ? v : []; }
  function safeObj(v){ return v && typeof v === "object" && !Array.isArray(v) ? v : {}; }
  function num(v){ return Number(v) || 0; }
  function avg(arr){
    const xs = safeArray(arr).map(x => Number(x)||0);
    return xs.length ? Math.round(xs.reduce((a,b)=>a+b,0)/xs.length) : 0;
  }
  function h(v){
    return String(v == null ? "" : v)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }
  function nl2br(v){ return h(v).replace(/\n/g,"<br>"); }
  function scoreColor(n){
    if(n >= 85) return "#16a34a";
    if(n >= 70) return "#d97706";
    return "#dc2626";
  }
  function scoreBg(n){
    if(n >= 85) return "#f0fdf4";
    if(n >= 70) return "#fffbeb";
    return "#fef2f2";
  }
  function sessionScore(s){
    if(!s || !s.scores) return 0;
    return avg(SESSION_SCORE_FIELDS.map(f => num(s.scores[f.key])));
  }
  function optionTag(value,label,selected){
    return `<option value="${h(value)}" ${String(value)===String(selected) ? "selected" : ""}>${h(label)}</option>`;
  }
  function getCourse(id){ return state.courses.find(x => x.id === id); }
  function getProject(id){ return state.projects.find(x => x.id === id); }

  function buildCourseModules(track){
    const tpl = COURSE_TEMPLATES[track] || COURSE_TEMPLATES.seminar;
    return tpl.modules.map((m,i)=>({
      id: uid("module"),
      week: i + 1,
      title: m.title,
      purpose: m.purpose,
      reading: m.reading,
      assignment: m.assignment,
      aiMode: m.aiMode,
      deliverable: m.deliverable,
      usage: m.usage,
      done: false,
      notes: ""
    }));
  }

  function buildProjectPhases(){
    return PROJECT_PHASE_TEMPLATES.map((p,i)=>({
      id: uid("phase"),
      key: p.key,
      order: i + 1,
      name: p.name,
      purpose: p.purpose,
      deliverable: p.deliverable,
      gate: p.gate,
      progress: i === 0 ? 10 : 0,
      done: false,
      note: ""
    }));
  }

  function buildProjectDeliverables(phases){
    return phases.map(ph => ({
      id: uid("deliverable"),
      title: ph.name + "阶段交付物",
      phaseId: ph.id,
      description: ph.deliverable,
      status: "待开始",
      dueDate: "",
      proof: "",
      score: ""
    }));
  }

  function initialState(){
    return {
      program:{
        phase:1,
        week:1,
        streak:0,
        lastDate:null
      },
      courses:[],
      projects:[],
      sessions:[],
      flaws:[],
      reviews:[],
      assessments:[],
      portfolio:[]
    };
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return initialState();
      const s = JSON.parse(raw);
      s.program = Object.assign(initialState().program, safeObj(s.program));
      s.courses = safeArray(s.courses);
      s.projects = safeArray(s.projects);
      s.sessions = safeArray(s.sessions);
      s.flaws = safeArray(s.flaws);
      s.reviews = safeArray(s.reviews);
      s.assessments = safeArray(s.assessments);
      s.portfolio = safeArray(s.portfolio);

      s.courses = s.courses.map(c => ({
        id: c.id || uid("course"),
        title: c.title || "未命名课程",
        question: c.question || "",
        goal: c.goal || "",
        description: c.description || "",
        track: c.track || "seminar",
        color: c.color || "#1d4ed8",
        status: c.status || "进行中",
        createdAt: c.createdAt || today(),
        modules: safeArray(c.modules),
        resources: safeArray(c.resources),
        notes: c.notes || "",
        finalArtifact: c.finalArtifact || "",
        finalReflection: c.finalReflection || "",
        assessmentInfo: c.assessmentInfo || (COURSE_TEMPLATES[c.track] ? COURSE_TEMPLATES[c.track].assessment : "")
      }));

      s.projects = s.projects.map(p => ({
        id: p.id || uid("project"),
        title: p.title || "未命名项目",
        question: p.question || "",
        why: p.why || "",
        outputType: p.outputType || "论文",
        deadline: p.deadline || "",
        color: p.color || "#7c3aed",
        courseId: p.courseId || "",
        status: p.status || "进行中",
        createdAt: p.createdAt || today(),
        blueprint: Object.assign({problem:"",gap:"",claim:"",scope:"",method:""}, safeObj(p.blueprint)),
        phases: safeArray(p.phases),
        deliverables: safeArray(p.deliverables),
        resources: safeArray(p.resources),
        notes: p.notes || "",
        reviewNotes: p.reviewNotes || "",
        currentPhaseId: p.currentPhaseId || (safeArray(p.phases)[0] ? p.phases[0].id : "")
      }));

      return s;
    }catch(e){
      return initialState();
    }
  }

  function saveState(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function setState(mutator){
    mutator(state);
    saveState();
    render();
  }

  function downloadText(filename,text){
    const blob = new Blob([text], {type:"application/json;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  function renderPage(){
    if(ui.page === "courses" && ui.courseId){

      return renderProjectDetail();
    }
    switch(ui.page){

      case "projects": return renderProjectsPage();
      case "sessions": return renderSessionsPage();
      case "flaws": return renderFlawsPage();
      case "reviews": return renderReviewsPage();
      case "assessments": return renderAssessmentsPage();
      case "portfolio": return renderPortfolioPage();
      case "analytics": return renderAnalyticsPage();

  function cardStat(title,value,sub,color){
    return `
      <div class="card">
        <div class="label">${h(title)}</div>
        <div style="font-size:28px;font-weight:900;color:${color};margin:6px 0">${h(value)}</div>
        <div class="tiny">${h(sub || "")}</div>
      </div>
    `;
  }

  function getNextCourseTasks(){
    return state.courses
      .filter(c => c.status !== "已完成")
      .map(course => {
        const next = course.modules.find(m => !m.done) || course.modules[course.modules.length-1];
        return {course, module: next};
      })
      .filter(x => x.module);
  }

    return state.projects.filter(p => p.status !== "已完成");

  function renderAnalyticsPage(){
    const sessions = state.sessions;
    const avgScoreAll = sessions.length ? avg(sessions.map(sessionScore)) : 0;
    const totalMinutes = sessions.reduce((n,s)=>n+num(s.minutes),0);
    const totalWords = sessions.reduce((n,s)=>n+num(s.words),0);
    const passRate = sessions.length ? Math.round(sessions.filter(s=>s.passed).length / sessions.length * 100) : 0;

    const trend = [...sessions].sort((a,b)=>(a.date+a.id).localeCompare(b.date+b.id)).slice(-24).map(sessionScore);
    const dimAvg = SESSION_SCORE_FIELDS.map(f => ({
      label:f.label,
      key:f.key,
      score: sessions.length ? avg(sessions.map(s => num(s.scores && s.scores[f.key]))) : 0
    }));

    const flawMap = {};
    state.flaws.forEach(f => flawMap[f.type] = (flawMap[f.type] || 0) + 1);
    const flawData = Object.entries(flawMap).sort((a,b)=>b[1]-a[1]).slice(0,8);

    const weekMap = {};
    sessions.forEach(s => {
      const d = parseDate(s.date);
      const year = d.getFullYear();
      const jan1 = new Date(year,0,1);
      const dayOfYear = Math.floor((d - jan1) / 86400000) + 1;
      const week = Math.ceil(dayOfYear / 7);
      const key = year + "-W" + week;
      if(!weekMap[key]) weekMap[key] = [];
      weekMap[key].push(sessionScore(s));
    });
    const weekTrend = Object.entries(weekMap).map(([k,v]) => ({key:k, score:avg(v)})).slice(-16);

    const dow = [0,0,0,0,0,0,0];
    sessions.forEach(s => dow[parseDate(s.date).getDay()] += num(s.minutes));

    return `
      <div class="page-header">
        <div>
          <div class="page-title">分析</div>
          <div class="page-sub">分析不是为了看着好看，而是为了回答：哪些训练真的有效、哪些缺陷老是在重复、哪门课和哪个项目最值得继续深挖。</div>
        </div>
      </div>

      <div class="grid grid-4" style="margin-bottom:12px">
        ${cardStat("总训练时间", totalMinutes + " 分钟", "累计投入", "#1d4ed8")}
        ${cardStat("总产出字数", totalWords + " 字", "累计写作", "#16a34a")}
        ${cardStat("综合均分", avgScoreAll, "全部训练平均分", scoreColor(avgScoreAll))}
        ${cardStat("达标率", passRate + "%", "已达标训练占比", passRate >= 70 ? "#16a34a" : "#dc2626")}
      </div>

      <div class="grid grid-2">
        <div class="card">
          <div class="label">最近 24 次训练评分趋势</div>
          ${trend.length ? `
            <div class="bar-wrap">
              ${trend.map(v => `
                <div class="bar-item">
                  <div class="bar" style="height:${Math.max(4, v*0.7)}px;background:${scoreColor(v)}22;border:1px solid ${scoreColor(v)}55"></div>
                  <div class="bar-value" style="color:${scoreColor(v)}">${v}</div>
                </div>
              `).join("")}
            </div>
          ` : `<div class="empty">还没有足够数据。</div>`}
        </div>

        <div class="card">
          <div class="label">五维能力均分</div>
          <div class="grid grid-3" style="margin-top:10px">
            ${dimAvg.map(d => `
              <div class="score-box" style="background:${scoreBg(d.score)}">
                <div style="font-size:22px;font-weight:900;color:${scoreColor(d.score)}">${d.score}</div>
                <div class="tiny">${h(d.label)}</div>
              </div>
            `).join("")}
          </div>
        </div>

        <div class="card">
          <div class="label">高频缺陷</div>
          ${flawData.length ? flawData.map(([name,count]) => {
            const pct = Math.round(count / state.flaws.length * 100);
            return `
              <div style="margin-top:10px">
                <div class="row-between">
                  <div class="small">${h(name)}</div>
                  <div class="tiny">${count} 次（${pct}%）</div>
                </div>
                <div class="progress" style="margin-top:4px"><div style="width:${pct}%;background:#dc2626"></div></div>
              </div>
            `;
          }).join("") : `<div class="empty">还没有缺陷数据。</div>`}
        </div>

        <div class="card">
          <div class="label">各周均分趋势</div>
          ${weekTrend.length ? `
            <div class="bar-wrap">
              ${weekTrend.map(item => `
                <div class="bar-item">
                  <div class="bar" style="height:${Math.max(4, item.score*0.6)}px;background:${scoreColor(item.score)}33;border:1px solid ${scoreColor(item.score)}55"></div>
                  <div class="bar-label">${h(item.key.split("-")[1])}</div>
                  <div class="bar-value" style="color:${scoreColor(item.score)}">${item.score}</div>
                </div>
              `).join("")}
            </div>
          ` : `<div class="empty">还没有周趋势数据。</div>`}
        </div>

        <div class="card" style="grid-column:1/-1">
          <div class="label">每周几投入时间最多</div>
          <div class="bar-wrap">
            ${dow.map((v,i) => {
              const max = Math.max(...dow, 1);
              return `
                <div class="bar-item">
                  <div class="bar" style="height:${Math.max(4, v/max*70)}px;background:#3b82f6"></div>
                  <div class="bar-label">${WEEKDAYS[i]}</div>
                  <div class="bar-value">${v}m</div>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      </div>
    `;
  }

  function openModal(type, extra){
    ui.modal = Object.assign({type:type}, extra || {});
    render();
  }
  function closeModal(){
    ui.modal = null;
    render();
  }

  function deleteEntity(entity, id, extra){
    setState(s => {
      if(entity === "course"){
        s.courses = s.courses.filter(x => x.id !== id);
        s.sessions = s.sessions.map(ss => ss.courseId === id ? Object.assign({}, ss, {courseId:""}) : ss);
        s.projects = s.projects.map(p => p.courseId === id ? Object.assign({}, p, {courseId:""}) : p);
        s.reviews = s.reviews.filter(r => !(r.targetType==="course" && r.targetId===id));
        s.assessments = s.assessments.filter(a => !(a.level==="课程" && a.targetId===id));
        s.portfolio = s.portfolio.filter(p => !(p.targetType==="course" && p.targetId===id));
        if(ui.courseId === id) ui.courseId = "";
      }
      if(entity === "module"){
        const course = getCourse(extra.courseId);
        course.modules = course.modules.filter(x => x.id !== id);
      }
      if(entity === "project"){
        s.projects = s.projects.filter(x => x.id !== id);
        s.sessions = s.sessions.map(ss => ss.projectId === id ? Object.assign({}, ss, {projectId:""}) : ss);
        s.reviews = s.reviews.filter(r => !(r.targetType==="project" && r.targetId===id));
        s.assessments = s.assessments.filter(a => !(a.level==="项目" && a.targetId===id));
        s.portfolio = s.portfolio.filter(p => !(p.targetType==="project" && p.targetId===id));
        if(ui.projectId === id) ui.projectId = "";
      }
      if(entity === "phase"){
        const project = getProject(extra.projectId);
        project.phases = project.phases.filter(x => x.id !== id);
        project.deliverables = project.deliverables.filter(d => d.phaseId !== id);
        if(project.currentPhaseId === id) project.currentPhaseId = project.phases[0] ? project.phases[0].id : "";
      }
      if(entity === "deliverable"){
        const project = getProject(extra.projectId);
        project.deliverables = project.deliverables.filter(x => x.id !== id);
      }
      if(entity === "resource"){
        if(extra.ownerType === "course"){
          const course = getCourse(extra.ownerId);
          course.resources = course.resources.filter(x => x.id !== id);
        }else{
          const project = getProject(extra.ownerId);
          project.resources = project.resources.filter(x => x.id !== id);
        }
      }
      if(entity === "session"){
        s.sessions = s.sessions.filter(x => x.id !== id);
      }

        s.flaws = s.flaws.filter(x => x.id !== id);

      }
      if(entity === "portfolio"){
        s.portfolio = s.portfolio.filter(x => x.id !== id);
      }
    });
  }

  document.addEventListener("change", function(e){
    const el = e.target;
    if(el.dataset.changeAction === "set-phase-progress"){
      const project = getProject(el.dataset.projectId);
      setState(() => {
        const ph = project.phases.find(x => x.id === el.dataset.id);
        ph.progress = num(el.value);
      });
    }

    if(el.id === "import-file"){
      const file = el.files && el.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(){
        try{
          const parsed = JSON.parse(reader.result);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
          location.reload();
        }catch(err){
          alert("导入失败：文件格式不正确");
        }
      };
      reader.readAsText(file, "utf-8");
    }
  });

  // 处理“清空全部数据”的确认
  const originalDeleteEntity = deleteEntity;
  document.addEventListener("click", function(e){
    const btn = e.target.closest("[data-action='confirm-delete-do']");
    if(!btn || !ui.modal) return;
    if(ui.modal.entity === "reset-all"){
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }
  }, true);

  render();
})();
</script>
</body>
</html>
