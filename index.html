<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const STORAGE_KEY = "logos_harvard_selfstudy_v10";
const WEEKDAYS = ["周日","周一","周二","周三","周四","周五","周六"];

const PROGRAM_PHASES = {
  1:{name:"奠基", color:"#3b82f6", weeks:12, gate:"任意500字文章→15分钟还原论证骨架+找最弱环节；逻辑与概念审计无重大漏洞"},
  2:{name:"扩展", color:"#10b981", weeks:16, gate:"原典对话+思想史脉络重构；能处理最强反驳"},
  3:{name:"深化", color:"#f59e0b", weeks:16, gate:"专精方向研究级阅读+综合论证；可参加专业讨论"},
  4:{name:"整合", color:"#8b5cf6", weeks:20, gate:"thesis 风格项目+公开答辩；形成个人方法论"}
};

function today(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function fmtDate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function parseDate(s){
  return new Date(`${s}T12:00:00`);
}
function dateDiff(a,b){
  return Math.round((parseDate(a) - parseDate(b))/86400000);
}
function uid(prefix="id"){
  return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,6)}`;
}
function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }
function avg(arr){
  if(!arr || !arr.length) return 0;
  return Math.round(arr.reduce((s,n)=>s+(Number(n)||0),0)/arr.length);
}
function scoreColor(n){
  if(n >= 85) return "#16a34a";
  if(n >= 70) return "#d97706";
  return "#dc2626";
}
function scoreBg(n){
  if(n >= 85) return "#f0fdf4";
  if(n >= 70) return "#fffbeb";
  return "#fef2f2";
}
function ensureArray(v){ return Array.isArray(v) ? v : []; }
function ensureObject(v){ return v && typeof v === "object" && !Array.isArray(v) ? v : {}; }
function downloadText(filename,text){
  const blob = new Blob([text], {type:"application/json;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}
function monthCells(year, month){
  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);
  const cells = [];
  for(let i=0;i<first.getDay();i++) cells.push(null);
  for(let d=1; d<=last.getDate(); d++) cells.push(new Date(year, month, d));
  while(cells.length % 7 !== 0) cells.push(null);
  return cells;
}
function emptyScoreMap(dims, value = 70){
  const out = {};
  dims.forEach(d => out[d.id] = value);
  return out;
}
function scoreAvg(scores, dims){
  if(!dims.length) return 0;
  return avg(dims.map(d => Number(scores?.[d.id] ?? 70)));
}
function gateAvg(scores, dims){
  if(!dims.length) return 0;
  return avg(dims.map(d => Number(scores?.[d.id] ?? 70)));
}

function defaultSettings(){

    ],

      {id:"logic", label:"逻辑有效性", desc:"前提→结论是否成立"},

      {id:"map", label:"文献地图", color:"#10b981", weight:20, deliverable:"立场图谱 + 核心文献 + 争议点", gate:"能说清 A/B/C 立场"},
      {id:"build", label:"搭建论证", color:"#f59e0b", weight:30, deliverable:"主张 + 前提链 + 证据链", gate:"能画出 argument map"},
      {id:"revise", label:"反驳与修订", color:"#8b5cf6", weight:25, deliverable:"steelman + rebuttal + 二稿/三稿", gate:"最强反驳后仍能站住"},
      {id:"defend", label:"答辩与产出", color:"#ef4444", weight:15, deliverable:"终稿/展示/答辩稿", gate:"公开表达并经受追问"}

}

function defaultState(){
  const settings = defaultSettings();
  return {
    version: 10,
    phase: 1,
    week: 1,
    day: 1,
    streak: 0,
    best: 0,
    lastDate: null,
    gateScores:{1:null,2:null,3:null,4:null},
    settings,
    courses:[],
    projects:[],
    plans:{},
    logs:[],
    reviews:[],
    flaws:[],
    sessions:0,
    pieces:0
  };
}

function normalizeSettings(raw = {}){
  const base = defaultSettings();

  const aiModes = ensureArray(raw.aiModes).length ? raw.aiModes : base.aiModes;
  const flawTypes = ensureArray(raw.flawTypes).length ? raw.flawTypes : base.flawTypes;
  const reviewTypes = ensureArray(raw.reviewTypes).length ? raw.reviewTypes : base.reviewTypes;
  const outputTypes = ensureArray(raw.outputTypes).length ? raw.outputTypes : base.outputTypes;
  const scoreDims = ensureArray(raw.scoreDims).length ? raw.scoreDims : base.scoreDims;
  const gateDims = ensureArray(raw.gateDims).length ? raw.gateDims : base.gateDims;
  const projectPhases = ensureArray(raw.projectPhases).length ? raw.projectPhases : base.projectPhases;

  return {
    aiModes: aiModes.map((x,i)=>({
      id: x.id || `mode_${i}`,
      label: x.label || `模式${i+1}`,
      color: x.color || base.aiModes[i % base.aiModes.length].color
    })),
    flawTypes: flawTypes.map(x => String(x || "").trim()).filter(Boolean),
    reviewTypes: reviewTypes.map((x,i)=>({
      id: x.id || `review_${i}`,
      label: x.label || `复盘${i+1}`,
      icon: x.icon || "📝",
      color: x.color || base.reviewTypes[i % base.reviewTypes.length].color
    })),
    outputTypes: outputTypes.map(x => String(x || "").trim()).filter(Boolean),
    scoreDims: scoreDims.map((x,i)=>({
      id: x.id || `score_${i}`,
      label: x.label || `维度${i+1}`,
      desc: x.desc || ""
    })).filter(Boolean),
    gateDims: gateDims.map((x,i)=>({
      id: x.id || `gate_${i}`,
      label: x.label || `Gate${i+1}`,
      desc: x.desc || ""
    })).filter(Boolean),
    projectPhases: projectPhases.map((x,i)=>({
      id: x.id || `phase_${i}`,
      label: x.label || `阶段${i+1}`,
      color: x.color || base.projectPhases[i % base.projectPhases.length].color,
      weight: Number(x.weight ?? base.projectPhases[i % base.projectPhases.length].weight) || 10,
      deliverable: x.deliverable || "",
      gate: x.gate || ""
    })).filter(Boolean),
    targets:{
      ...base.targets,
      ...ensureObject(raw.targets)
    }
  };
}

function recomputeDerived(state){
  const logs = ensureArray(state.logs);
  const uniqueDates = [...new Set(logs.map(l => l.date))].sort();
  let best = 0;
  let run = 0;
  for(let i=0;i<uniqueDates.length;i++){
    if(i > 0 && dateDiff(uniqueDates[i], uniqueDates[i-1]) === 1) run += 1;
    else run = 1;
    best = Math.max(best, run);
  }
  let streak = 0;
  const t = today();
  if(uniqueDates.length && uniqueDates[uniqueDates.length - 1] === t){
    streak = 1;
    for(let i=uniqueDates.length-1;i>0;i--){
      if(dateDiff(uniqueDates[i], uniqueDates[i-1]) === 1) streak += 1;
      else break;
    }
  }
  const weekLogs = logs.filter(l => Number(l.phase) === Number(state.phase) && Number(l.week) === Number(state.week));
  return {
    ...state,
    sessions: logs.length,
    pieces: logs.length,
    best,
    streak,
    lastDate: uniqueDates[uniqueDates.length - 1] || null,
    day: clamp(weekLogs.length + 1, 1, 7)
  };
}

function normalizeState(raw){
  const base = defaultState();
  const settings = normalizeSettings(raw?.settings || {});
  let state = {
    ...base,
    ...ensureObject(raw),
    settings,
    gateScores:{1:null,2:null,3:null,4:null,...ensureObject(raw?.gateScores)}
  };

  state.courses = ensureArray(raw?.courses).map((c,i)=>({
    id: c.id || uid(`course_${i}`),
    name: c.name || "",
    goal: c.goal || "",
    syllabus: c.syllabus || "",
    notes: c.notes || "",
    color: c.color || "#3b82f6",
    status: c.status || "active",
    createdDate: c.createdDate || today()
  }));

  const phaseIds = settings.projectPhases.map(x => x.id);
  state.projects = ensureArray(raw?.projects).map((p,i)=>({
    id: p.id || uid(`project_${i}`),
    courseId: p.courseId || null,
    name: p.name || "",
    question: p.question || "",
    deadline: p.deadline || "",
    color: p.color || "#3b82f6",
    outputType: p.outputType || settings.outputTypes[0],
    status: p.status || "active",
    currentPhase: phaseIds.includes(p.currentPhase) ? p.currentPhase : phaseIds[0],
    currentPhasePct: clamp(Number(p.currentPhasePct || 0),0,100),
    resources: ensureArray(p.resources).map((r,j)=>({
      id: r.id || uid(`res_${j}`),
      type: r.type || "book",
      title: r.title || "",
      notes: r.notes || "",
      date: r.date || today()
    })),
    notes: p.notes || "",
    createdDate: p.createdDate || today(),
    completedDate: p.completedDate || null
  }));

  state.plans = ensureObject(raw?.plans);
  Object.keys(state.plans).forEach(date=>{
    const p = ensureObject(state.plans[date]);
    state.plans[date] = {
      note: p.note || "",
      tasks: ensureArray(p.tasks).map((t,idx)=>({
        id: t.id || uid(`task_${idx}`),
        text: t.text || "",
        done: !!t.done,
        expanded: !!t.expanded,
        projectId: t.projectId || null,
        courseId: t.courseId || null,
        artifactType: t.artifactType || settings.outputTypes[0],
        difficulty: t.difficulty || "中",
        record:{
          notes: t.record?.notes || "",
          minutes: Number(t.record?.minutes || 0),
          words: Number(t.record?.words || 0),
          passed: !!t.record?.passed,
          flaws: t.record?.flaws || ""
        }
      }))
    };
  });

  state.logs = ensureArray(raw?.logs).map((l,i)=>({
    id: l.id || uid(`log_${i}`),
    date: l.date || today(),
    phase: Number(l.phase || state.phase),
    week: Number(l.week || state.week),
    day: Number(l.day || 1),
    scores:{...emptyScoreMap(settings.scoreDims,70), ...ensureObject(l.scores)},
    aiModes: ensureArray(l.aiModes),
    minutes: Number(l.minutes || 0),
    words: Number(l.words || 0),
    notes: l.notes || "",
    passed: typeof l.passed === "boolean" ? l.passed : false,
    projectId: l.projectId || null,
    courseId: l.courseId || null,
    sourceType: l.sourceType || "manual",
    sourceId: l.sourceId || null,
    planDate: l.planDate || null
  }));

  state.reviews = ensureArray(raw?.reviews).map((r,i)=>({
    id: r.id || uid(`review_${i}`),
    date: r.date || today(),
    type: r.type || settings.reviewTypes[0].id,
    title: r.title || "",
    phase: Number(r.phase || state.phase),
    week: Number(r.week || state.week),
    score: Number(r.score || 0),
    strengths: r.strengths || "",
    weaknesses: r.weaknesses || "",
    nextGoal: r.nextGoal || "",
    verdict: r.verdict || "通过",
    refLogIds: ensureArray(r.refLogIds),
    refFlawIds: ensureArray(r.refFlawIds),
    projectId: r.projectId || null,
    courseId: r.courseId || null
  }));

  state.flaws = ensureArray(raw?.flaws).map((f,i)=>({
    id: f.id || uid(`flaw_${i}`),
    date: f.date || today(),
    type: f.type || settings.flawTypes[0],
    description: f.description || "",
    resolved: !!f.resolved,
    resolvedDate: f.resolvedDate || null,
    projectId: f.projectId || null,
    courseId: f.courseId || null,
    sourceLogId: f.sourceLogId || null,
    sourceTaskId: f.sourceTaskId || null,
    sourcePlanDate: f.sourcePlanDate || null
  }));

  state = recomputeDerived(state);
  return state;
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    return normalizeState(JSON.parse(raw));
  }catch(e){
    return defaultState();
  }
}
function saveState(state){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){}
}

function removeProjectCascade(state, projectId){
  const nextPlans = {};
  Object.entries(state.plans || {}).forEach(([date, plan])=>{
    nextPlans[date] = {
      ...plan,
      tasks: ensureArray(plan.tasks).filter(t => t.projectId !== projectId)
    };
  });
  return recomputeDerived({
    ...state,
    projects: state.projects.filter(p => p.id !== projectId),
    logs: state.logs.filter(l => l.projectId !== projectId),
    reviews: state.reviews.filter(r => r.projectId !== projectId),
    flaws: state.flaws.filter(f => f.projectId !== projectId),
    plans: nextPlans
  });
}

function removeCourseCascade(state, courseId){
  const projectIds = state.projects.filter(p => p.courseId === courseId).map(p => p.id);
  const projectIdSet = new Set(projectIds);
  const nextPlans = {};
  Object.entries(state.plans || {}).forEach(([date, plan])=>{
    nextPlans[date] = {
      ...plan,
      tasks: ensureArray(plan.tasks).filter(t => t.courseId !== courseId && !projectIdSet.has(t.projectId))
    };
  });
  return recomputeDerived({
    ...state,
    courses: state.courses.filter(c => c.id !== courseId),
    projects: state.projects.filter(p => p.courseId !== courseId),
    logs: state.logs.filter(l => l.courseId !== courseId && !projectIdSet.has(l.projectId)),
    reviews: state.reviews.filter(r => r.courseId !== courseId && !projectIdSet.has(r.projectId)),
    flaws: state.flaws.filter(f => f.courseId !== courseId && !projectIdSet.has(f.projectId)),
    plans: nextPlans
  });
}

function removePlanDateCascade(state, targetDate){
  const plan = state.plans?.[targetDate] || {tasks:[]};
  const taskIds = new Set(ensureArray(plan.tasks).map(t => t.id));
  const nextPlans = {...state.plans};
  delete nextPlans[targetDate];
  return recomputeDerived({
    ...state,
    plans: nextPlans,
    logs: state.logs.filter(l => !(l.planDate === targetDate || (l.sourceId && taskIds.has(l.sourceId)))),
    flaws: state.flaws.filter(f => !(f.sourcePlanDate === targetDate || (f.sourceTaskId && taskIds.has(f.sourceTaskId))))
  });
}

function App(){
  const [state,setState] = useState(loadState);
  const [view,setView] = useState("dashboard");
  const [modal,setModal] = useState(null);
  const [selectedProjectId,setSelectedProjectId] = useState(null);
  const [pickedDate,setPickedDate] = useState(today());

  useEffect(()=>saveState(state), [state]);

  useEffect(()=>{
    if(selectedProjectId && !state.projects.find(p => p.id === selectedProjectId)){
      setSelectedProjectId(null);
    }
  }, [selectedProjectId, state.projects]);

  const update = (fnOrObj) => {
    setState(prev => {
      const next = typeof fnOrObj === "function" ? fnOrObj(prev) : {...prev, ...fnOrObj};
      return normalizeState(next);
    });
  };

  const openModal = (type, payload={}) => setModal({type, ...payload});
  const closeModal = () => setModal(null);

  return (
    <div className="app">
      <Header state={state} />
      <Nav view={view} setView={setView} />
      <main className="container">
        {view === "dashboard" && <DashboardView state={state} setView={setView} openModal={openModal} setPickedDate={setPickedDate} />}
        {view === "courses" && <CoursesView state={state} update={update} openModal={openModal} />}
        {view === "projects" && <ProjectsView state={state} update={update} openModal={openModal} selectedProjectId={selectedProjectId} setSelectedProjectId={setSelectedProjectId} />}
        {view === "plan" && <PlanView state={state} update={update} openModal={openModal} pickedDate={pickedDate} setPickedDate={setPickedDate} />}
        {view === "calendar" && <CalendarView state={state} update={update} openModal={openModal} pickedDate={pickedDate} setPickedDate={setPickedDate} setView={setView} />}
        {view === "logs" && <LogsView state={state} update={update} openModal={openModal} pickedDate={pickedDate} />}
        {view === "reviews" && <ReviewsView state={state} update={update} openModal={openModal} />}
        {view === "flaws" && <FlawsView state={state} update={update} openModal={openModal} />}
        {view === "gates" && <GatesView state={state} update={update} openModal={openModal} />}
        {view === "analytics" && <AnalyticsView state={state} />}
        {view === "settings" && <SettingsView state={state} update={update} />}
      </main>

      {modal?.type === "course" && <CourseModal state={state} update={update} item={modal.item} onClose={closeModal} />}
      {modal?.type === "project" && <ProjectModal state={state} update={update} item={modal.item} onClose={closeModal} />}
      {modal?.type === "log" && <LogModal state={state} update={update} item={modal.item} date={modal.date} prefill={modal.prefill} onClose={closeModal} />}
      {modal?.type === "review" && <ReviewModal state={state} update={update} item={modal.item} reviewType={modal.reviewType} projectId={modal.projectId} courseId={modal.courseId} onClose={closeModal} />}
      {modal?.type === "flaw" && <FlawModal state={state} update={update} item={modal.item} projectId={modal.projectId} courseId={modal.courseId} onClose={closeModal} />}
      {modal?.type === "gate" && <GateModal state={state} update={update} targetPhase={modal.targetPhase} onClose={closeModal} />}
    </div>
  );
}

function CourseCard({course,state,update,openModal}){
  const linkedProjects = state.projects.filter(p => p.courseId === course.id);
  const linkedLogs = state.logs.filter(l => l.courseId === course.id);
  const avgScoreValue = linkedLogs.length ? avg(linkedLogs.map(l => scoreAvg(l.scores, state.settings.scoreDims))) : 0;

  const onDelete = () => {
    if(!window.confirm(`确认删除课程「${course.name}」？这会级联删除其下项目、相关日志、复盘、缺陷、计划任务。`)) return;
    update(s => removeCourseCascade(s, course.id));
  };

  return (
    <Card style={{marginBottom:10,borderLeft:`4px solid ${course.color}`}}>
      <div className="row-between" style={{alignItems:"flex-start"}}>
        <div style={{flex:1}}>

            <span className="small" style={{color:scoreColor(avgScoreValue)}}>{linkedLogs.length ? `${avgScoreValue} 均分` : "暂无分数"}</span>

        </div>

function ProjectsView({state,update,openModal,selectedProjectId,setSelectedProjectId}){
  const selected = state.projects.find(p => p.id === selectedProjectId);
  if(selected){
    return <ProjectDetail project={selected} state={state} update={update} openModal={openModal} onBack={()=>setSelectedProjectId(null)} />;
  }

  const active = state.projects.filter(p => p.status === "active");
  const done = state.projects.filter(p => p.status === "done");

  return (
    <div>
      <PageHeader
        title="项目"
        sub="项目 = 一个明确问题 + 一条证据链 + 一个交付物 + 一次答辩。"
        action={<PrimaryButton label="＋新建项目" onClick={()=>openModal("project")} />}
      />

      {state.projects.length === 0 && (
        <Card style={{textAlign:"center",padding:36}}>
          <div style={{fontSize:32,marginBottom:8}}>📁</div>
          <div style={{fontSize:16,fontWeight:800,marginBottom:6}}>还没有项目</div>
          <div className="small" style={{lineHeight:1.7,marginBottom:14}}>
            如果没有项目，训练就会退化成碎片化学习。<br/>
            真正的上限来自：围绕一个问题持续收集证据、建立论证、反驳、修订、答辩。
          </div>
          <PrimaryButton label="创建第一个项目" onClick={()=>openModal("project")} />
        </Card>
      )}

      {active.length > 0 && <div className="section-title">进行中</div>}
      {active.map(project => (
        <ProjectCard key={project.id} project={project} state={state} openModal={openModal} update={update} onOpen={()=>setSelectedProjectId(project.id)} />
      ))}

      {done.length > 0 && <div className="section-title" style={{color:"#16a34a"}}>已完成</div>}
      {done.map(project => (
        <ProjectCard key={project.id} project={project} state={state} openModal={openModal} update={update} onOpen={()=>setSelectedProjectId(project.id)} />
      ))}
    </div>
  );
}

function ProjectCard({project,state,openModal,update,onOpen}){
  const logs = state.logs.filter(l => l.projectId === project.id);
  const totalMinutes = logs.reduce((s,l)=>s+(l.minutes||0),0);
  const phases = state.settings.projectPhases;
  const idx = Math.max(0, phases.findIndex(p => p.id === project.currentPhase));
  const phase = phases[idx] || phases[0];
  const progress = Math.round((idx + (project.currentPhasePct || 0)/100) / phases.length * 100);
  const daysLeft = project.deadline ? dateDiff(project.deadline, today()) : null;
  const course = state.courses.find(c => c.id === project.courseId);

  const onDelete = () => {
    if(!window.confirm(`确认删除项目「${project.name}」？这会级联删除关联日志、复盘、缺陷，以及计划中的关联任务。`)) return;
    update(s => removeProjectCascade(s, project.id));
  };

  return (
    <Card style={{marginBottom:10,borderLeft:`4px solid ${project.color}`}}>
      <div className="row-between" style={{alignItems:"flex-start"}}>
        <div style={{flex:1,cursor:"pointer"}} onClick={onOpen}>
          <div className="row" style={{flexWrap:"wrap",marginBottom:4}}>
            <div style={{fontSize:16,fontWeight:800}}>{project.name}</div>
            {project.status === "done" && <Tag text="已完成" color="#16a34a" bg="#f0fdf4" border="#86efac" />}
            {course && <Tag text={`课程：${course.name}`} color={course.color} bg={`${course.color}11`} border={`${course.color}55`} />}
          </div>
          {project.question && <div className="small" style={{marginBottom:6,lineHeight:1.6}}>{project.question}</div>}
          <div className="row" style={{flexWrap:"wrap"}}>
            <span className="small">⏱ {Math.round(totalMinutes/60*10)/10}h</span>
            <span className="small">📝 {logs.length} 次训练</span>
            <span className="small" style={{color:project.color}}>{phase.label}</span>
            {daysLeft !== null && <span className="small" style={{color:daysLeft < 7 ? "#dc2626" : "#64748b"}}>{daysLeft >= 0 ? `${daysLeft} 天后截止` : `已超期 ${Math.abs(daysLeft)} 天`}</span>}
          </div>
          <Progress value={progress} color={project.color} style={{marginTop:8}} />
        </div>
        <div className="btn-row">
          <GhostButton label="打开" onClick={onOpen} className="btn-sm" />
          <GhostButton label="编辑" onClick={()=>openModal("project",{item:project})} className="btn-sm" />
          <DangerButton label="删除" onClick={onDelete} className="btn-sm" />
        </div>
      </div>
    </Card>
  );
}

function ProjectDetail({project,state,update,openModal,onBack}){
  const [tab,setTab] = useState("overview");
  const phases = state.settings.projectPhases;
  const logs = state.logs.filter(l => l.projectId === project.id);
  const flaws = state.flaws.filter(f => f.projectId === project.id);
  const totalMinutes = logs.reduce((s,l)=>s+(l.minutes||0),0);
  const totalWords = logs.reduce((s,l)=>s+(l.words||0),0);
  const daysLeft = project.deadline ? dateDiff(project.deadline, today()) : null;
  const avgValue = logs.length ? avg(logs.map(l => scoreAvg(l.scores, state.settings.scoreDims))) : 0;
  const course = state.courses.find(c => c.id === project.courseId);

  const onDelete = () => {
    if(!window.confirm(`确认删除项目「${project.name}」？这会级联删除关联日志、复盘、缺陷、计划任务。`)) return;
    update(s => removeProjectCascade(s, project.id));
    onBack();
  };

  return (
    <div>
      <div className="page-header">
        <div className="row-top" style={{width:"100%"}}>
          <GhostButton label="← 返回" onClick={onBack} />
          <div style={{flex:1}}>
            <div className="page-title">{project.name}</div>
            {project.question && <div className="page-sub">{project.question}</div>}
            <div className="row" style={{marginTop:6,flexWrap:"wrap"}}>
              {course && <Tag text={`课程：${course.name}`} color={course.color} bg={`${course.color}11`} border={`${course.color}55`} />}
              <Tag text={project.outputType} color={project.color} bg={`${project.color}11`} border={`${project.color}55`} />
            </div>
          </div>
          <div className="btn-row">
            <GhostButton label="编辑" onClick={()=>openModal("project",{item:project})} />
            <DangerButton label="删除项目" onClick={onDelete} />
          </div>
        </div>
      </div>

      <div className="grid grid-4" style={{marginBottom:12}}>
        <Card><div className="label">总投入</div><div style={{fontSize:22,fontWeight:800,marginTop:6,color:"#3b82f6"}}>{Math.round(totalMinutes/60*10)/10}h</div><div className="small">{totalMinutes} 分钟</div></Card>
        <Card><div className="label">总产出</div><div style={{fontSize:22,fontWeight:800,marginTop:6,color:"#10b981"}}>{totalWords}</div><div className="small">字</div></Card>
        <Card><div className="label">综合均分</div><div style={{fontSize:22,fontWeight:800,marginTop:6,color:scoreColor(avgValue)}}>{logs.length ? avgValue : "—"}</div><div className="small">{logs.length} 条日志</div></Card>
        <Card><div className="label">剩余时间</div><div style={{fontSize:22,fontWeight:800,marginTop:6,color:daysLeft !== null && daysLeft < 7 ? "#dc2626" : "#d97706"}}>{daysLeft !== null ? (daysLeft >= 0 ? `${daysLeft}d` : "超期") : "—"}</div><div className="small">{project.deadline || "未设置截止"}</div></Card>
      </div>

      <div className="sidebar-tabs">
        {[
          ["overview","进度"],
          ["timeline","时间线"],
          ["quality","质量"],
          ["resources","资料"],
          ["notes","笔记"]
        ].map(([id,label])=>(
          <button key={id} className={`sidebar-tab ${tab===id?"active":""}`} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>

      {tab === "overview" && (
        <div>
          <Card style={{marginBottom:12}}>
            <div className="label">项目阶段（可自定义）</div>
            <div style={{marginTop:10}}>
              {phases.map((ph, i) => {
                const curIndex = Math.max(0, phases.findIndex(x => x.id === project.currentPhase));
                const isDone = i < curIndex;
                const isCurrent = i === curIndex;
                const pct = isDone ? 100 : isCurrent ? (project.currentPhasePct || 0) : 0;
                return (
                  <div key={ph.id} style={{marginBottom:12}}>
                    <div className="row-between" style={{marginBottom:4,alignItems:"flex-start"}}>
                      <div>
                        <div className="row" style={{flexWrap:"wrap"}}>
                          <Tag text={`${i+1}`} color="#fff" bg={isDone ? "#16a34a" : isCurrent ? ph.color : "#cbd5e1"} border={isDone ? "#16a34a" : isCurrent ? ph.color : "#cbd5e1"} />
                          <div style={{fontSize:13,fontWeight:800,color:isCurrent ? ph.color : isDone ? "#16a34a" : "#64748b"}}>{ph.label}</div>
                          {isCurrent && <Tag text="当前" color={ph.color} bg={`${ph.color}11`} border={`${ph.color}55`} />}
                        </div>
                        <div className="small" style={{marginTop:4}}>{ph.deliverable}</div>
                        <div className="tiny" style={{marginTop:2}}>通关：{ph.gate}</div>
                      </div>
                      <div style={{fontSize:12,fontWeight:700,color:isCurrent ? ph.color : "#94a3b8"}}>{pct}%</div>
                    </div>
                    <Progress value={pct} color={isDone ? "#16a34a" : ph.color} />
                    {isCurrent && (
                      <div style={{marginTop:8}}>
                        <input
                          type="range"
                          min="0"
                          max="100"
                          value={project.currentPhasePct || 0}
                          style={{width:"100%", accentColor: ph.color}}
                          onChange={(e)=>update(s=>({
                            ...s,
                            projects:s.projects.map(p=>p.id===project.id ? {...p, currentPhasePct:Number(e.target.value)} : p)
                          }))}
                        />
                        <div className="btn-row">
                          {i > 0 && <GhostButton label="← 上一阶段" onClick={()=>update(s=>({
                            ...s,
                            projects:s.projects.map(p=>p.id===project.id ? {...p, currentPhase:phases[i-1].id, currentPhasePct:100} : p)
                          }))} className="btn-sm" />}
                          {i < phases.length - 1 && <PrimaryButton label="进入下一阶段 →" onClick={()=>update(s=>({
                            ...s,
                            projects:s.projects.map(p=>p.id===project.id ? {...p, currentPhase:phases[i+1].id, currentPhasePct:0} : p)
                          }))} className="btn-sm" />}
                          {i === phases.length - 1 && project.status !== "done" && <GreenButton label="标记完成" onClick={()=>update(s=>({
                            ...s,
                            projects:s.projects.map(p=>p.id===project.id ? {...p, status:"done", completedDate:today()} : p)
                          }))} className="btn-sm" />}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </Card>

          <Card style={{marginBottom:12}}>
            <div className="label">动作</div>
            <div className="btn-row" style={{marginTop:10}}>
              <PrimaryButton label="＋记录项目训练" onClick={()=>openModal("log",{date:today(), prefill:{projectId:project.id, courseId:project.courseId}})} />
              <GhostButton label="＋记录项目缺陷" onClick={()=>openModal("flaw",{projectId:project.id, courseId:project.courseId})} />
              <GhostButton label="＋项目复盘" onClick={()=>openModal("review",{reviewType:"project", projectId:project.id, courseId:project.courseId})} />
            </div>
          </Card>

          {logs.length > 0 && (
            <Card style={{marginBottom:12}}>
              <div className="label">最近训练</div>
              {logs.sort((a,b)=>b.date.localeCompare(a.date)).slice(0,4).map(log => {
                const v = scoreAvg(log.scores, state.settings.scoreDims);
                return (
                  <div key={log.id} className="list-row">
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700}}>{log.date}</div>
                      <div className="small">{log.minutes} 分钟 · {log.words} 字</div>
                      {log.notes && <div className="tiny" style={{marginTop:4,lineHeight:1.5}}>{log.notes.slice(0,120)}</div>}
                    </div>
                    <div style={{fontSize:20,fontWeight:900,color:scoreColor(v)}}>{v}</div>
                  </div>
                );
              })}
            </Card>
          )}

          {flaws.filter(f=>!f.resolved).length > 0 && (
            <Card className="warn-zone">
              <div className="label" style={{color:"#a16207"}}>未解决缺陷</div>
              {flaws.filter(f=>!f.resolved).map(f => (
                <div key={f.id} className="list-row">
                  <div style={{flex:1}}>
                    <div className="small" style={{fontWeight:700,color:"#991b1b"}}>{f.type}</div>
                    <div className="small" style={{lineHeight:1.6}}>{f.description}</div>
                  </div>
                </div>
              ))}
            </Card>
          )}
        </div>
      )}

      {tab === "timeline" && <ProjectTimeline logs={logs} scoreDims={state.settings.scoreDims} />}
      {tab === "quality" && <ProjectQuality logs={logs} flaws={flaws} scoreDims={state.settings.scoreDims} />}
      {tab === "resources" && <ProjectResources project={project} update={update} />}
      {tab === "notes" && <ProjectNotes project={project} update={update} />}
    </div>
  );
}

function ProjectTimeline({logs,scoreDims}){
  if(!logs.length) return <Empty text="暂无项目时间线数据" />;
  const grouped = {};
  logs.forEach(l => {
    if(!grouped[l.date]) grouped[l.date] = [];
    grouped[l.date].push(l);
  });

  return (
    <div>
      {Object.keys(grouped).sort((a,b)=>b.localeCompare(a)).map(date => {
        const dayLogs = grouped[date];
        const mins = dayLogs.reduce((s,l)=>s+(l.minutes||0),0);
        const score = avg(dayLogs.map(l => scoreAvg(l.scores, scoreDims)));
        return (
          <Card key={date} style={{marginBottom:10}}>
            <div className="row-between">
              <div>
                <div style={{fontSize:14,fontWeight:800}}>{date}</div>
                <div className="small">{WEEKDAYS[parseDate(date).getDay()]} · {mins} 分钟 · {dayLogs.length} 次</div>
              </div>
              <div style={{fontSize:22,fontWeight:900,color:scoreColor(score)}}>{score}</div>
            </div>
            {dayLogs.map(l => (
              <div key={l.id} className="list-row">
                <div style={{flex:1}}>
                  <div className="small">{l.words} 字 · {ensureArray(l.aiModes).length ? `AI: ${ensureArray(l.aiModes).join(" / ")}` : "无 AI 标记"}</div>
                  {l.notes && <div className="tiny" style={{lineHeight:1.6}}>{l.notes}</div>}
                </div>
              </div>
            ))}
          </Card>
        );
      })}
    </div>
  );
}

function ProjectQuality({logs,flaws,scoreDims}){
  if(!logs.length) return <Empty text="暂无项目质量数据" />;
  const dimValues = scoreDims.map(d => ({
    ...d,
    avg: avg(logs.map(l => Number(l.scores?.[d.id] ?? 70)))
  }));
  const topFlaws = Object.entries(flaws.reduce((m,f)=>{ m[f.type]=(m[f.type]||0)+1; return m; }, {})).sort((a,b)=>b[1]-a[1]);

  return (
    <div className="grid grid-2">
      <Card>
        <div className="label">能力维度均分</div>
        <div className="grid grid-2" style={{marginTop:10}}>
          {dimValues.map(d => (
            <div key={d.id} className="score-box" style={{background:scoreBg(d.avg)}}>
              <div style={{fontSize:20,fontWeight:900,color:scoreColor(d.avg)}}>{d.avg}</div>
              <div className="small">{d.label}</div>
            </div>
          ))}
        </div>
      </Card>
      <Card>
        <div className="label">高频缺陷</div>
        {topFlaws.length === 0 ? <Empty text="暂无缺陷数据" /> : (
          <div style={{marginTop:10}}>
            {topFlaws.map(([type,count]) => {
              const pct = Math.round(count / flaws.length * 100);
              return (
                <div key={type} style={{marginBottom:10}}>
                  <div className="row-between" style={{marginBottom:4}}>
                    <div className="small">{type}</div>
                    <div className="small" style={{color:"#dc2626"}}>{count} 次 · {pct}%</div>
                  </div>
                  <Progress value={pct} color="#dc2626" />
                </div>
              );
            })}
          </div>
        )}
      </Card>
    </div>
  );
}

function ProjectResources({project,update}){
  const [draft,setDraft] = useState({type:"book", title:"", notes:""});
  const [editingId,setEditingId] = useState(null);
  const [editing,setEditing] = useState({type:"book", title:"", notes:""});

  const types = [
    {id:"book", icon:"📚"},
    {id:"paper", icon:"📄"},
    {id:"article", icon:"🔗"},
    {id:"video", icon:"🎬"},
    {id:"other", icon:"📌"}
  ];

  const addResource = () => {
    if(!draft.title.trim()) return;
    update(s => ({
      ...s,
      projects:s.projects.map(p => p.id===project.id ? {
        ...p,
        resources:[...(p.resources||[]), {id:uid("res"), date:today(), ...draft}]
      } : p)
    }));
    setDraft({type:"book", title:"", notes:""});
  };

  const startEdit = (item) => {
    setEditingId(item.id);
    setEditing({type:item.type || "book", title:item.title || "", notes:item.notes || ""});
  };
  const saveEdit = () => {
    if(!editingId || !editing.title.trim()) return;
    update(s => ({
      ...s,
      projects:s.projects.map(p => p.id===project.id ? {
        ...p,
        resources:(p.resources||[]).map(r => r.id===editingId ? {...r, ...editing} : r)
      } : p)
    }));
    setEditingId(null);
  };
  const deleteRes = (id) => {
    if(!window.confirm("确认删除这条资料？")) return;
    update(s => ({
      ...s,
      projects:s.projects.map(p => p.id===project.id ? {
        ...p,
        resources:(p.resources||[]).filter(r => r.id !== id)
      } : p)
    }));
  };

  return (
    <div>
      <Card style={{marginBottom:12}}>
        <div className="label">新增资料</div>
        <div className="btn-row" style={{margin:"10px 0"}}>
          {types.map(t => (
            <button
              key={t.id}
              className="chip"
              style={{cursor:"pointer", borderColor:draft.type===t.id ? "#3b82f6" : "#e2e8f0", color:draft.type===t.id ? "#1d4ed8" : "#64748b"}}
              onClick={()=>setDraft(prev=>({...prev, type:t.id}))}
            >
              {t.icon}
            </button>
          ))}
        </div>
        <div className="field">
          <input className="input" value={draft.title} onChange={e=>setDraft(prev=>({...prev, title:e.target.value}))} placeholder="资料标题" />
        </div>
        <div className="field">
          <textarea className="textarea" rows="3" value={draft.notes} onChange={e=>setDraft(prev=>({...prev, notes:e.target.value}))} placeholder="为什么重要？核心信息是什么？" />
        </div>
        <PrimaryButton label="添加资料" onClick={addResource} />
      </Card>

      <Card>
        <div className="label">资料列表</div>
        {(project.resources || []).length === 0 ? <Empty text="暂无资料" /> : (project.resources || []).map(r => {
          const isEditing = editingId === r.id;
          return (
            <div key={r.id} className="list-row">
              <div style={{flex:1}}>
                {!isEditing ? (
                  <>
                    <div style={{fontSize:14,fontWeight:800}}>{types.find(t=>t.id===r.type)?.icon || "📌"} {r.title}</div>
                    {r.notes && <div className="small" style={{marginTop:4,lineHeight:1.6}}>{r.notes}</div>}
                    <div className="tiny" style={{marginTop:4}}>{r.date}</div>
                  </>
                ) : (
                  <>
                    <div className="btn-row" style={{marginBottom:8}}>
                      {types.map(t => (
                        <button
                          key={t.id}
                          className="chip"
                          style={{cursor:"pointer", borderColor:editing.type===t.id ? "#3b82f6" : "#e2e8f0", color:editing.type===t.id ? "#1d4ed8" : "#64748b"}}
                          onClick={()=>setEditing(prev=>({...prev, type:t.id}))}
                        >
                          {t.icon}
                        </button>
                      ))}
                    </div>
                    <div className="field">
                      <input className="input" value={editing.title} onChange={e=>setEditing(prev=>({...prev, title:e.target.value}))} />
                    </div>
                    <div className="field">
                      <textarea className="textarea" rows="3" value={editing.notes} onChange={e=>setEditing(prev=>({...prev, notes:e.target.value}))} />
                    </div>
                  </>
                )}
              </div>
              <div className="btn-row" style={{flexDirection:"column"}}>
                {!isEditing ? (
                  <>
                    <GhostButton label="编辑" onClick={()=>startEdit(r)} className="btn-sm" />
                    <DangerButton label="删除" onClick={()=>deleteRes(r.id)} className="btn-sm" />
                  </>
                ) : (
                  <>
                    <PrimaryButton label="保存" onClick={saveEdit} className="btn-sm" />
                    <GhostButton label="取消" onClick={()=>setEditingId(null)} className="btn-sm" />
                  </>
                )}
              </div>
            </div>
          );
        })}
      </Card>
    </div>
  );
}

function ProjectNotes({project,update}){
  const clearNotes = () => {
    if(!window.confirm("确认清空项目笔记？")) return;
    update(s => ({
      ...s,
      projects:s.projects.map(p => p.id===project.id ? {...p, notes:""} : p)

  return (
    <Card>
      <div className="row-between" style={{marginBottom:8}}>
        <div className="label">项目笔记</div>

      </div>
      <textarea
        className="textarea"
        rows="16"
        value={project.notes || ""}

function PlanView({state,update,openModal,pickedDate,setPickedDate}){
  const plan = state.plans[pickedDate] || {tasks:[], note:""};
  const isFuture = pickedDate > today();

  const setPlan = (updater) => {
    update(s => {
      const current = s.plans[pickedDate] || {tasks:[], note:""};
      const next = typeof updater === "function" ? updater(current) : updater;
      return {
        ...s,
        plans:{
          ...s.plans,
          [pickedDate]: next
        }
      };
    });
  };

  const addTask = (text="") => {
    setPlan(p => ({
      ...p,
      tasks:[
        ...(p.tasks || []),
        {
          id: uid("task"),
          text,
          done:false,
          expanded:false,
          projectId:null,
          courseId:null,
          artifactType: state.settings.outputTypes[0],
          difficulty:"中",
          record:{notes:"", minutes:0, words:0, passed:false, flaws:""}
        }
      ]
    }));
  };

  const updateTask = (taskId, patch) => {
    setPlan(p => ({
      ...p,
      tasks:(p.tasks || []).map(t => t.id===taskId ? {...t, ...patch} : t)
    }));
  };

  const updateTaskRecord = (taskId, patch) => {
    setPlan(p => ({
      ...p,
      tasks:(p.tasks || []).map(t => t.id===taskId ? {...t, record:{...t.record, ...patch}} : t)
    }));
  };

  const syncTaskArtifacts = (taskId) => {
    update(s => {
      const currentPlan = s.plans[pickedDate] || {tasks:[], note:""};
      const task = currentPlan.tasks.find(t => t.id === taskId);
      if(!task) return s;

      const taskProject = s.projects.find(p => p.id === task.projectId);
      const courseId = task.courseId || taskProject?.courseId || null;

      let logs = s.logs.filter(l => l.sourceId !== taskId);
      let flaws = s.flaws.filter(f => f.sourceTaskId !== taskId);

      if(task.done){
        const rec = task.record || {};
        if(rec.notes?.trim() || rec.minutes || rec.words){
          logs = logs.concat({
            id: `tasklog_${taskId}`,
            date: pickedDate,
            phase: s.phase,
            week: s.week,
            day: s.day,
            scores: emptyScoreMap(s.settings.scoreDims, 70),
            aiModes: [],
            minutes: Number(rec.minutes || 0),
            words: Number(rec.words || 0),
            notes: `[任务] ${task.text}${rec.notes ? `\n${rec.notes}` : ""}`,
            passed: !!rec.passed,
            projectId: task.projectId || null,
            courseId,
            sourceType: "task",
            sourceId: taskId,
            planDate: pickedDate
          });
        }
        if(rec.flaws?.trim()){
          flaws = flaws.concat({
            id: `taskflaw_${taskId}`,
            date: pickedDate,
            type: s.settings.flawTypes[0] || "其他",
            description: `[任务] ${task.text}：${rec.flaws}`,
            resolved: false,
            resolvedDate: null,
            projectId: task.projectId || null,
            courseId,
            sourceLogId: null,
            sourceTaskId: taskId,
            sourcePlanDate: pickedDate
          });
        }
      }

      return recomputeDerived({
        ...s,
        logs,
        flaws
      });
    });
  };

  const toggleTaskDone = (taskId) => {
    setPlan(p => ({
      ...p,
      tasks:(p.tasks || []).map(t => t.id===taskId ? {...t, done:!t.done} : t)
    }));
    setTimeout(()=>syncTaskArtifacts(taskId), 0);
  };

  const deleteTask = (taskId) => {
    if(!window.confirm("确认删除这个任务？")) return;
    update(s => {
      const current = s.plans[pickedDate] || {tasks:[], note:""};
      return recomputeDerived({
        ...s,
        plans:{
          ...s.plans,
          [pickedDate]: {...current, tasks:(current.tasks || []).filter(t => t.id !== taskId)}
        },
        logs:s.logs.filter(l => l.sourceId !== taskId),
        flaws:s.flaws.filter(f => f.sourceTaskId !== taskId)
      });
    });
  };

  const deleteDayPlan = () => {
    if(!window.confirm(`确认删除 ${pickedDate} 的整天计划？会连带删除该日由计划自动生成的日志和缺陷。`)) return;
    update(s => removePlanDateCascade(s, pickedDate));
  };

  const total = plan.tasks.length;
  const done = plan.tasks.filter(t => t.done).length;
  const percent = total ? Math.round(done/total*100) : 0;

  const templates = [
    "原典阅读 45 分钟 + 300 字摘要",
    "短分析文 800 字",
    "AI 口头答辩 15 分钟",
    "AI Office Hours：带提纲被追问",
    "Steelman 对手 + rebuttal",
    "二稿/三稿修订",
    "记录本周最强缺陷",
    "项目文献地图推进"
  ];

  return (
    <div>
      <PageHeader
        title="学习规划"
        sub="任务不是待办，而是训练单元：必须绑定课程、项目、产出类型。"
        action={<DangerButton label="删除当天计划" onClick={deleteDayPlan} />}
      />

      <div className="row-between" style={{marginBottom:12}}>
        <div className="row" style={{gap:8}}>
          <GhostButton label="← 前一天" onClick={()=>setPickedDate(fmtDate(new Date(parseDate(pickedDate).getTime()-86400000)))} />
          <input className="input" type="date" value={pickedDate} onChange={e=>setPickedDate(e.target.value)} style={{width:160}} />
          <GhostButton label="后一天 →" onClick={()=>setPickedDate(fmtDate(new Date(parseDate(pickedDate).getTime()+86400000)))} />
        </div>
        <Tag text={pickedDate === today() ? "今天" : pickedDate > today() ? "未来计划" : "历史补录"} color={pickedDate > today() ? "#d97706" : "#1d4ed8"} bg={pickedDate > today() ? "#fffbeb" : "#eff6ff"} border={pickedDate > today() ? "#fcd34d" : "#bfdbfe"} />
      </div>

      <div className="grid grid-3" style={{marginBottom:12}}>
        <Card><div className="label">任务</div><div style={{fontSize:24,fontWeight:900,marginTop:6,color:percent===100 ? "#16a34a" : percent ? "#d97706" : "#0f172a"}}>{done}/{total}</div><div className="small">完成率 {percent}%</div></Card>
        <Card><div className="label">自动日志</div><div style={{fontSize:24,fontWeight:900,marginTop:6,color:"#3b82f6"}}>{state.logs.filter(l => l.planDate===pickedDate).length}</div><div className="small">由任务同步生成</div></Card>
        <Card><div className="label">自动缺陷</div><div style={{fontSize:24,fontWeight:900,marginTop:6,color:"#dc2626"}}>{state.flaws.filter(f => f.sourcePlanDate===pickedDate).length}</div><div className="small">由任务同步生成</div></Card>
      </div>

      <Card style={{marginBottom:12}}>
        <div className="row-between">
          <div className="label">任务列表</div>
          <PrimaryButton label="＋添加任务" onClick={()=>addTask()} />
        </div>
        {(plan.tasks || []).length === 0 ? <Empty text="还没有任务。先用模板，别空想。" /> : (
          <div style={{marginTop:8}}>
            {(plan.tasks || []).map(task => (
              <TaskRow
                key={task.id}
                state={state}
                task={task}
                pickedDate={pickedDate}
                updateTask={updateTask}
                updateTaskRecord={updateTaskRecord}
                toggleTaskDone={toggleTaskDone}
                deleteTask={deleteTask}
                syncTaskArtifacts={syncTaskArtifacts}
              />
            ))}
          </div>
        )}
      </Card>

      <Card style={{marginBottom:12}}>
        <div className="label">快速模板</div>
        <div className="btn-row" style={{marginTop:10}}>
          {templates.map(t => (
            <button key={t} className="chip" style={{cursor:"pointer", color:"#1d4ed8", borderColor:"#bfdbfe", background:"#eff6ff"}} onClick={()=>addTask(t)}>＋{t}</button>
          ))}
        </div>
      </Card>

      <Card style={{marginBottom:12}}>
        <div className="label">当天说明</div>
        <textarea
          className="textarea"
          rows="4"
          value={plan.note || ""}
          onChange={e=>setPlan(p => ({...p, note:e.target.value}))}
          placeholder="今天的策略、重点、待验证的假设、答辩时要重点防守的地方。"
        />
      </Card>

      {!isFuture && (
        <Card className="blue-zone">
          <div className="row-between">
            <div>
              <div className="label" style={{color:"#1d4ed8"}}>补录 / 手动记录</div>
              <div className="small" style={{marginTop:6}}>计划外训练也必须进入日志。</div>
            </div>
            <PrimaryButton label="＋补录训练日志" onClick={()=>openModal("log",{date:pickedDate})} />
          </div>
        </Card>
      )}
    </div>
  );
}

function TaskRow({state,task,pickedDate,updateTask,updateTaskRecord,toggleTaskDone,deleteTask,syncTaskArtifacts}){
  const linkedFlaws = state.flaws.filter(f => f.sourceTaskId === task.id);
  const linkedLog = state.logs.find(l => l.sourceId === task.id);

  return (
    <div className={`card ${task.done ? "task-done" : ""}`} style={{marginBottom:10,padding:10}}>
      <div className="row-top">
        <button
          className="btn"
          style={{
            width:28,height:28,padding:0,borderRadius:8,
            borderColor:task.done ? "#16a34a" : "#cbd5e1",
            background:task.done ? "#dcfce7" : "#fff",
            color:"#16a34a",
            flexShrink:0
          }}
          onClick={()=>toggleTaskDone(task.id)}
        >
          {task.done ? "✓" : ""}
        </button>

        <div style={{flex:1}}>
          <input
            className="input"
            value={task.text}
            onChange={e=>updateTask(task.id,{text:e.target.value})}
            placeholder="任务内容"
            style={{marginBottom:8, textDecoration:task.done ? "line-through" : "none"}}
          />

          <div className="grid grid-4">
            <select className="select" value={task.courseId || ""} onChange={e=>updateTask(task.id,{courseId:e.target.value || null})}>
              <option value="">未绑定课程</option>
              {state.courses.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>

            <select className="select" value={task.projectId || ""} onChange={e=>updateTask(task.id,{projectId:e.target.value || null})}>
              <option value="">未绑定项目</option>
              {state.projects.filter(p => p.status === "active").map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
            </select>

            <select className="select" value={task.artifactType || ""} onChange={e=>updateTask(task.id,{artifactType:e.target.value})}>
              {state.settings.outputTypes.map(x => <option key={x} value={x}>{x}</option>)}
            </select>

            <select className="select" value={task.difficulty || "中"} onChange={e=>updateTask(task.id,{difficulty:e.target.value})}>
              {["低","中","高","极高"].map(x => <option key={x} value={x}>{x}难度</option>)}
            </select>
          </div>

          <div className="btn-row" style={{marginTop:8}}>
            <GhostButton label={task.expanded ? "收起记录" : "展开记录"} onClick={()=>updateTask(task.id,{expanded:!task.expanded})} className="btn-sm" />
            <DangerButton label="删除任务" onClick={()=>deleteTask(task.id)} className="btn-sm" />
            {linkedLog && <Tag text="已同步日志" color="#16a34a" bg="#f0fdf4" border="#86efac" />}
            {linkedFlaws.length > 0 && <Tag text={`已同步缺陷 ${linkedFlaws.length}`} color="#dc2626" bg="#fef2f2" border="#fca5a5" />}
          </div>

          {task.expanded && (
            <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #f1f5f9"}}>
              <div className="field">
                <div className="field-label">任务记录</div>
                <textarea
                  className="textarea"
                  rows="3"
                  value={task.record?.notes || ""}
                  onChange={e=>updateTaskRecord(task.id,{notes:e.target.value})}
                  placeholder="今天学到了什么？哪里被击穿了？哪里站住了？"
                />
              </div>

              <div className="grid grid-3">
                <div className="field">
                  <div className="field-label">用时（分钟）</div>
                  <input className="input" type="number" value={task.record?.minutes || 0} onChange={e=>updateTaskRecord(task.id,{minutes:Number(e.target.value||0)})} />
                </div>
                <div className="field">
                  <div className="field-label">产出（字数）</div>
                  <input className="input" type="number" value={task.record?.words || 0} onChange={e=>updateTaskRecord(task.id,{words:Number(e.target.value||0)})} />
                </div>
                <div className="field">
                  <div className="field-label">是否达标</div>
                  <button
                    className={`btn ${task.record?.passed ? "btn-green" : "btn-danger"}`}
                    onClick={()=>updateTaskRecord(task.id,{passed:!task.record?.passed})}
                    style={{width:"100%"}}
                  >
                    {task.record?.passed ? "✓ 达标" : "✗ 未达标"}
                  </button>
                </div>
              </div>

              <div className="field">
                <div className="field-label" style={{color:"#dc2626"}}>本任务暴露出的思维缺陷</div>
                <textarea
                  className="textarea"
                  rows="2"
                  value={task.record?.flaws || ""}
                  onChange={e=>updateTaskRecord(task.id,{flaws:e.target.value})}
                  placeholder="具体写出：哪一步错了、为什么错、下次如何检验"
                />
              </div>

              <div className="btn-row">
                <PrimaryButton label="立即同步到日志/缺陷" onClick={()=>syncTaskArtifacts(task.id)} className="btn-sm" />
                <GhostButton label="用这条记录开日志" onClick={()=>{
                  const prefill = {
                    courseId: task.courseId || null,
                    projectId: task.projectId || null,
                    minutes: task.record?.minutes || 0,
                    words: task.record?.words || 0,
                    notes: `[任务] ${task.text}\n${task.record?.notes || ""}`
                  };
                  const evt = new CustomEvent("open-log-modal",{detail:{date:pickedDate,prefill}});
                  window.dispatchEvent(evt);
                }} className="btn-sm" />
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function CalendarView({state,openModal,pickedDate,setPickedDate,setView}){
  const d = parseDate(pickedDate);
  const [yearMonth,setYearMonth] = useState({year:d.getFullYear(), month:d.getMonth()});

  useEffect(()=>{
    const x = parseDate(pickedDate);
    setYearMonth({year:x.getFullYear(), month:x.getMonth()});
  }, [pickedDate]);

  useEffect(()=>{
    const handler = (e) => openModal("log", {date:e.detail?.date, prefill:e.detail?.prefill});
    window.addEventListener("open-log-modal", handler);
    return () => window.removeEventListener("open-log-modal", handler);
  }, [openModal]);

  const cells = monthCells(yearMonth.year, yearMonth.month);

  const logsByDate = {};
  state.logs.forEach(l => {
    if(!logsByDate[l.date]) logsByDate[l.date] = [];
    logsByDate[l.date].push(l);
  });

  return (
    <div>
      <PageHeader
        title="训练日历"
        sub="看清你不是“有时努力”，而是是否形成了稳定训练节律。"
      />

      <div className="row-between" style={{marginBottom:12}}>
        <div className="row">
          <GhostButton label="← 上月" onClick={()=>{
            const dt = new Date(yearMonth.year, yearMonth.month - 1, 1);
            setYearMonth({year:dt.getFullYear(), month:dt.getMonth()});
          }} />
          <div style={{fontSize:16,fontWeight:800}}>{yearMonth.year} 年 {yearMonth.month + 1} 月</div>
          <GhostButton label="下月 →" onClick={()=>{
            const dt = new Date(yearMonth.year, yearMonth.month + 1, 1);
            setYearMonth({year:dt.getFullYear(), month:dt.getMonth()});
          }} />
        </div>
        <Tag text={pickedDate} color="#1d4ed8" bg="#eff6ff" border="#bfdbfe" />
      </div>

      <div className="calendar-header" style={{marginBottom:4}}>
        {WEEKDAYS.map(d => <div key={d} className="calendar-head">{d}</div>)}
      </div>
      <div className="calendar-grid">
        {cells.map((cell,idx)=>{
          if(!cell) return <div key={idx} />;
          const ds = fmtDate(cell);
          const dayLogs = logsByDate[ds] || [];
          const plan = state.plans?.[ds];
          const total = ensureArray(plan?.tasks).length;
          const done = ensureArray(plan?.tasks).filter(t => t.done).length;
          const planPct = total ? Math.round(done/total*100) : null;
          const avgScoreValue = dayLogs.length ? avg(dayLogs.map(l => scoreAvg(l.scores, state.settings.scoreDims))) : null;
          const isPicked = ds === pickedDate;
          const isToday = ds === today();

          return (
            <div
              key={idx}
              className="calendar-cell"
              style={{
                background:isPicked ? "#dbeafe" : isToday ? "#eff6ff" : "#fff",
                borderColor:isPicked ? "#3b82f6" : isToday ? "#93c5fd" : "#e2e8f0"
              }}
              onClick={()=>setPickedDate(ds)}
            >
              <div className="calendar-num" style={{fontWeight:isToday?800:400, color:isToday?"#1d4ed8":"#374151"}}>{cell.getDate()}</div>
              {avgScoreValue !== null && <div className="calendar-badge" style={{color:scoreColor(avgScoreValue)}}>{avgScoreValue}分</div>}
              {planPct !== null && <div className="tiny" style={{color:planPct===100 ? "#16a34a" : "#d97706"}}>{planPct}% 计划</div>}
            </div>
          );
        })}
      </div>

      <Card style={{marginTop:14}}>
        <div className="row-between">
          <div>
            <div className="label">日期详情</div>
            <div style={{fontSize:15,fontWeight:800,marginTop:6}}>{pickedDate} · {WEEKDAYS[parseDate(pickedDate).getDay()]}</div>
          </div>
          <div className="btn-row">
            <GhostButton label="去规划" onClick={()=>setView("plan")} />
            {pickedDate <= today() && <PrimaryButton label="补录日志" onClick={()=>openModal("log",{date:pickedDate})} />}
          </div>
        </div>
        <div className="separator" />
        {(logsByDate[pickedDate] || []).length === 0 ? <Empty text="这一天没有日志记录" /> : (logsByDate[pickedDate] || []).map(log => {
          const v = scoreAvg(log.scores, state.settings.scoreDims);
          return (
            <div key={log.id} className="list-row">
              <div style={{flex:1}}>
                <div className="small">{log.minutes} 分钟 · {log.words} 字 {log.projectId ? "· 项目训练" : ""}</div>
                {log.notes && <div className="tiny" style={{lineHeight:1.6}}>{log.notes.slice(0,120)}</div>}
              </div>
              <div style={{fontSize:18,fontWeight:900,color:scoreColor(v)}}>{v}</div>
            </div>
          );
        })}
      </Card>
    </div>
  );
}

function LogsView({state,update,openModal,pickedDate}){
  const [projectFilter,setProjectFilter] = useState("all");
  const [courseFilter,setCourseFilter] = useState("all");

  const logs = state.logs
    .filter(l => projectFilter === "all" ? true : l.projectId === projectFilter)
    .filter(l => courseFilter === "all" ? true : l.courseId === courseFilter)
    .sort((a,b)=> b.date.localeCompare(a.date));

  const deleteLog = (id) => {
    if(!window.confirm("确认删除这条日志？")) return;
    update(s => recomputeDerived({...s, logs:s.logs.filter(l => l.id !== id)}));
  };

  return (
    <div>
      <PageHeader
        title="训练日志"
        sub="所有训练都要落到可检索、可比较、可回看的记录。"
        action={<PrimaryButton label="＋新建日志" onClick={()=>openModal("log",{date:pickedDate || today()})} />}
      />

      <div className="grid grid-2" style={{marginBottom:12}}>
        <select className="select" value={projectFilter} onChange={e=>setProjectFilter(e.target.value)}>
          <option value="all">全部项目</option>
          {state.projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <select className="select" value={courseFilter} onChange={e=>setCourseFilter(e.target.value)}>
          <option value="all">全部课程</option>
          {state.courses.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
      </div>

      {logs.length === 0 ? <Empty text="暂无日志" /> : logs.map(log => (
        <LogCard
          key={log.id}
          log={log}
          state={state}
          onEdit={()=>openModal("log",{item:log})}
          onDelete={()=>deleteLog(log.id)}
        />
      ))}
    </div>
  );
}

function LogCard({log,state,onEdit,onDelete}){
  const scoreDims = state.settings.scoreDims;
  const v = scoreAvg(log.scores, scoreDims);
  const project = state.projects.find(p => p.id === log.projectId);
  const course = state.courses.find(c => c.id === log.courseId);

  return (
    <Card style={{marginBottom:10,borderLeft:`4px solid ${scoreColor(v)}`}}>
      <div className="row-between" style={{alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <div className="row" style={{flexWrap:"wrap",marginBottom:6}}>
            <div style={{fontSize:14,fontWeight:800}}>{log.date}</div>
            <Tag text={`P${log.phase} W${log.week}`} color={PROGRAM_PHASES[log.phase]?.color || "#1d4ed8"} bg="#eff6ff" border="#bfdbfe" />
            {project && <Tag text={`项目：${project.name}`} color={project.color} bg={`${project.color}11`} border={`${project.color}55`} />}
            {course && <Tag text={`课程：${course.name}`} color={course.color} bg={`${course.color}11`} border={`${course.color}55`} />}
            {log.sourceType === "task" && <Tag text="来自任务" color="#16a34a" bg="#f0fdf4" border="#86efac" />}
          </div>

          <div className="row" style={{flexWrap:"wrap",marginBottom:8}}>
            <span className="small">⏱ {log.minutes} 分钟</span>
            <span className="small">✍ {log.words} 字</span>
            <span className="small" style={{color:log.passed ? "#16a34a" : "#dc2626"}}>{log.passed ? "✓ 达标" : "✗ 未达标"}</span>
          </div>

          <div className="grid grid-3" style={{marginBottom:8}}>
            {scoreDims.map(d => (
              <div key={d.id} className="score-box" style={{background:scoreBg(Number(log.scores?.[d.id] ?? 70))}}>
                <div style={{fontSize:18,fontWeight:900,color:scoreColor(Number(log.scores?.[d.id] ?? 70))}}>{Number(log.scores?.[d.id] ?? 70)}</div>
                <div className="tiny">{d.label}</div>
              </div>
            ))}
          </div>

          {ensureArray(log.aiModes).length > 0 && (
            <div className="btn-row" style={{marginBottom:8}}>
              {ensureArray(log.aiModes).map(id => {
                const mode = state.settings.aiModes.find(x => x.id === id);
                return mode ? <Tag key={id} text={mode.label} color={mode.color} bg={`${mode.color}11`} border={`${mode.color}55`} /> : null;
              })}
            </div>
          )}

          {log.notes && <div className="small" style={{lineHeight:1.7,whiteSpace:"pre-wrap"}}>{log.notes}</div>}
        </div>

        <div style={{marginLeft:12,textAlign:"right"}}>
          <div style={{fontSize:26,fontWeight:900,color:scoreColor(v)}}>{v}</div>
          <div className="btn-row" style={{justifyContent:"flex-end",marginTop:8}}>
            <GhostButton label="编辑" onClick={onEdit} className="btn-sm" />
            <DangerButton label="删除" onClick={onDelete} className="btn-sm" />
          </div>
        </div>
      </div>
    </Card>
  );
}

function ReviewsView({state,update,openModal}){

function FlawsView({state,update,openModal}){
  const unresolved = state.flaws.filter(f => !f.resolved);
  const resolved = state.flaws.filter(f => f.resolved);
  const topFlaws = Object.entries(state.flaws.reduce((m,f)=>{m[f.type]=(m[f.type]||0)+1;return m;},{})).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const toggleResolved = (id, nextResolved) => {
    update(s => ({
      ...s,
      flaws:s.flaws.map(f => f.id===id ? {...f, resolved:nextResolved, resolvedDate:nextResolved ? today() : null} : f)
    }));
  };
  const deleteFlaw = (id) => {
    if(!window.confirm("确认删除这条缺陷？")) return;
    update(s => ({...s, flaws:s.flaws.filter(f => f.id !== id)}));
  };

  return (
    <div>
      <PageHeader
        title="缺陷档案"
        sub="高水平不是“少犯错”，而是能把错误类型化、复盘化、可复现地压下去。"
        action={<PrimaryButton label="＋记录缺陷" onClick={()=>openModal("flaw")} />}
      />

      {topFlaws.length > 0 && (
        <Card className="warn-zone" style={{marginBottom:12}}>
          <div className="label" style={{color:"#a16207"}}>高频缺陷 Top 5</div>
          <div style={{marginTop:10}}>
            {topFlaws.map(([type,count])=>(
              <div key={type} className="row-between" style={{padding:"6px 0", borderBottom:"1px solid #fde68a"}}>
                <div className="small">{type}</div>
                <div className="small" style={{color:"#dc2626",fontWeight:700}}>{count} 次</div>
              </div>
            ))}
          </div>
        </Card>
      )}

      {unresolved.length > 0 && <div className="section-title" style={{color:"#dc2626"}}>未解决</div>}
      {unresolved.map(item => <FlawCard key={item.id} item={item} state={state} onToggle={toggleResolved} onEdit={()=>openModal("flaw",{item})} onDelete={()=>deleteFlaw(item.id)} />)}

      {resolved.length > 0 && <div className="section-title" style={{color:"#16a34a"}}>已解决</div>}
      {resolved.map(item => <FlawCard key={item.id} item={item} state={state} onToggle={toggleResolved} onEdit={()=>openModal("flaw",{item})} onDelete={()=>deleteFlaw(item.id)} />)}

      {state.flaws.length === 0 && <Empty text="暂无缺陷记录" />}
    </div>
  );
}

function AnalyticsView({state}){
  const [projectFilter,setProjectFilter] = useState("all");
  const [courseFilter,setCourseFilter] = useState("all");

  const logs = state.logs
    .filter(l => projectFilter === "all" ? true : l.projectId === projectFilter)
    .filter(l => courseFilter === "all" ? true : l.courseId === courseFilter);

  const flaws = state.flaws
    .filter(f => projectFilter === "all" ? true : f.projectId === projectFilter)
    .filter(f => courseFilter === "all" ? true : f.courseId === courseFilter);

  const totalMinutes = logs.reduce((s,l)=>s+(l.minutes||0),0);
  const totalWords = logs.reduce((s,l)=>s+(l.words||0),0);
  const activeDays = new Set(logs.map(l => l.date)).size;
  const avgValue = logs.length ? avg(logs.map(l => scoreAvg(l.scores, state.settings.scoreDims))) : 0;
  const passRate = logs.length ? Math.round(logs.filter(l => l.passed).length / logs.length * 100) : 0;

  const dimData = state.settings.scoreDims.map(d => ({
    ...d,
    value: logs.length ? avg(logs.map(l => Number(l.scores?.[d.id] ?? 70))) : 0
  }));

  const flawData = Object.entries(flaws.reduce((m,f)=>{m[f.type]=(m[f.type]||0)+1;return m;},{})).sort((a,b)=>b[1]-a[1]);
  const trend = [...logs].sort((a,b)=>a.date.localeCompare(b.date)).slice(-20).map(l => scoreAvg(l.scores, state.settings.scoreDims));

  const weekMap = {};
  logs.forEach(l => {
    const key = `P${l.phase}W${l.week}`;
    if(!weekMap[key]) weekMap[key] = [];
    weekMap[key].push(scoreAvg(l.scores, state.settings.scoreDims));
  });
  const weekTrend = Object.entries(weekMap).map(([k,v])=>({k, v:avg(v)}));

  return (
    <div>
      <PageHeader
        title="分析"
        sub="输入多少不是核心。分布、趋势、稳定性、缺陷频率，才是硬指标。"
      />

      <div className="grid grid-2" style={{marginBottom:12}}>
        <select className="select" value={projectFilter} onChange={e=>setProjectFilter(e.target.value)}>
          <option value="all">全部项目</option>
          {state.projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <select className="select" value={courseFilter} onChange={e=>setCourseFilter(e.target.value)}>
          <option value="all">全部课程</option>
          {state.courses.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
      </div>

      <div className="grid grid-4" style={{marginBottom:12}}>
        <Card><div className="label">总投入</div><div style={{fontSize:22,fontWeight:900,marginTop:6,color:"#3b82f6"}}>{Math.round(totalMinutes/60*10)/10}h</div><div className="small">{totalMinutes} 分钟</div></Card>
        <Card><div className="label">总产出</div><div style={{fontSize:22,fontWeight:900,marginTop:6,color:"#10b981"}}>{totalWords}</div><div className="small">字</div></Card>
        <Card><div className="label">活跃天数</div><div style={{fontSize:22,fontWeight:900,marginTop:6,color:"#8b5cf6"}}>{activeDays}</div><div className="small">天</div></Card>
        <Card><div className="label">达标率</div><div style={{fontSize:22,fontWeight:900,marginTop:6,color:passRate>=70?"#16a34a":"#dc2626"}}>{passRate}%</div><div className="small">{logs.filter(l=>l.passed).length}/{logs.length}</div></Card>
      </div>

      <div className="grid grid-2" style={{marginBottom:12}}>
        <Card>
          <div className="label">最近 20 次评分趋势</div>
          {trend.length === 0 ? <Empty text="暂无数据" /> : (
            <div style={{display:"flex",gap:4,alignItems:"flex-end",height:90,marginTop:14}}>
              {trend.map((x,i)=>(
                <div key={i} style={{flex:1,textAlign:"center"}}>
                  <div style={{height:Math.max(6,x*0.75),background:scoreBg(x),borderTop:`2px solid ${scoreColor(x)}`,borderRadius:4}} />
                  <div className="tiny" style={{marginTop:4,color:scoreColor(x),fontWeight:700}}>{x}</div>
                </div>
              ))}
            </div>
          )}
        </Card>

        <Card>
          <div className="label">维度均分</div>
          <div className="grid grid-2" style={{marginTop:10}}>
            {dimData.map(d => (
              <div key={d.id} className="score-box" style={{background:scoreBg(d.value)}}>
                <div style={{fontSize:20,fontWeight:900,color:scoreColor(d.value)}}>{d.value}</div>
                <div className="small">{d.label}</div>
              </div>
            ))}
          </div>
        </Card>
      </div>

      <div className="grid grid-2">
        <Card>
          <div className="label">按周均分</div>
          {weekTrend.length === 0 ? <Empty text="暂无数据" /> : (
            <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"flex-end",marginTop:12}}>
              {weekTrend.map(item => (
                <div key={item.k} style={{minWidth:34,textAlign:"center"}}>
                  <div style={{height:Math.max(8,item.v*0.6),width:28,margin:"0 auto",background:scoreColor(item.v),borderRadius:4}} />
                  <div className="tiny" style={{marginTop:4}}>{item.k}</div>
                  <div className="tiny" style={{color:scoreColor(item.v),fontWeight:700}}>{item.v}</div>
                </div>
              ))}
            </div>
          )}
        </Card>

        <Card>
          <div className="label">缺陷分布</div>
          {flawData.length === 0 ? <Empty text="暂无缺陷数据" /> : (
            <div style={{marginTop:10}}>
              {flawData.map(([type,count])=>{
                const pct = Math.round(count / flaws.length * 100);
                return (
                  <div key={type} style={{marginBottom:10}}>
                    <div className="row-between" style={{marginBottom:4}}>
                      <div className="small">{type}</div>
                      <div className="small" style={{color:"#dc2626"}}>{count} 次 · {pct}%</div>
                    </div>
                    <Progress value={pct} color="#dc2626" />
                  </div>
                );
              })}
            </div>
          )}
        </Card>
      </div>
    </div>
  );
}

          <NumberField label="每周项目训练场次" value={settings.targets.weeklyProjectSessionsTarget} onChange={v=>patchSettings({targets:{...settings.targets, weeklyProjectSessionsTarget:v}})} />

      <Card style={{marginBottom:12}}>
        <div className="label">数据管理</div>
        <div className="btn-row" style={{marginTop:10, marginBottom:12}}>
          <PrimaryButton label="导出 JSON" onClick={()=>downloadText(`logos-backup-${today()}.json`, JSON.stringify(state,null,2))} />
          <GhostButton label="复制 JSON" onClick={()=>navigator.clipboard?.writeText(JSON.stringify(state,null,2))} />
          <DangerButton label="恢复默认" onClick={()=>{
            if(!window.confirm("确认恢复默认？这会清空当前全部数据。")) return;
            update(()=>defaultState());
          }} />
        </div>

        <div className="field">
          <div className="field-label">导入 JSON</div>
          <textarea className="textarea mono" rows="8" value={importText} onChange={e=>setImportText(e.target.value)} placeholder="把之前导出的 JSON 粘贴到这里" />
        </div>
        <PrimaryButton label="导入并覆盖当前数据" onClick={()=>{
          try{
            const parsed = JSON.parse(importText);
            if(!window.confirm("确认导入并覆盖当前数据？")) return;
            update(()=>normalizeState(parsed));
            setImportText("");
          }catch(e){
            alert("JSON 解析失败，请检查格式。");
          }
        }} />

    </div>
  );
}

function SimpleStringListEditor({title,items,onChange,placeholder}){
  const [draft,setDraft] = useState("");
  return (
    <Card style={{marginBottom:12}}>
      <div className="label">{title}</div>
      <div style={{marginTop:10}}>
        {items.map((item,idx)=>(
          <div key={`${title}_${idx}`} className="list-row">
            <input className="input" value={item} onChange={e=>{
              const next = [...items];
              next[idx] = e.target.value;
              onChange(next);
            }} />
            <DangerButton label="删除" onClick={()=>{
              if(items.length <= 1){ alert("至少保留 1 项。"); return; }
              onChange(items.filter((_,i)=>i!==idx));
            }} className="btn-sm" />
          </div>
        ))}
      </div>
      <div className="row" style={{marginTop:10}}>
        <input className="input" value={draft} onChange={e=>setDraft(e.target.value)} placeholder={placeholder} />
        <PrimaryButton label="新增" onClick={()=>{
          if(!draft.trim()) return;
          onChange(items.concat(draft.trim()));
          setDraft("");
        }} />
      </div>
    </Card>
  );
}

function LogModal({state,update,item,date,prefill,onClose}){
  const dims = state.settings.scoreDims;
  const targets = state.settings.targets;

  const initial = item || {
    id:null,
    date: date || today(),
    phase: state.phase,
    week: state.week,
    day: state.day,
    scores: emptyScoreMap(dims, 70),
    aiModes: [],
    minutes: prefill?.minutes || targets.dailyMinMinutes,
    words: prefill?.words || targets.dailyMinWords,
    notes: prefill?.notes || "",
    passed:false,
    projectId: prefill?.projectId || null,
    courseId: prefill?.courseId || null,
    sourceType:"manual",
    sourceId:null,
    planDate:null
  };

  const [form,setForm] = useState({
    ...initial,
    scores:{...emptyScoreMap(dims,70), ...ensureObject(initial.scores)}
  });

  useEffect(()=>{
    const handler = (e) => {
      const x = e.detail || {};
      setForm(prev => ({
        ...prev,
        date:x.date || prev.date,
        projectId:x.prefill?.projectId ?? prev.projectId,
        courseId:x.prefill?.courseId ?? prev.courseId,
        minutes:x.prefill?.minutes ?? prev.minutes,
        words:x.prefill?.words ?? prev.words,
        notes:x.prefill?.notes ?? prev.notes
      }));
    };
    window.addEventListener("open-log-modal", handler);
    return () => window.removeEventListener("open-log-modal", handler);
  }, []);

  const avgValue = scoreAvg(form.scores, dims);
  const autoPassed = form.minutes >= Math.round(targets.dailyMinMinutes * 0.8) && form.words >= Math.round(targets.dailyMinWords * 0.8) && avgValue >= 70;

  const save = () => {
    const next = {...form, id: form.id || uid("log"), passed:autoPassed};
    if(item){
      update(s => recomputeDerived({...s, logs:s.logs.map(l => l.id===next.id ? next : l)}));

      update(s => recomputeDerived({...s, logs:[...s.logs, next]}));
