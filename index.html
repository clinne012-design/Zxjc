function ReviewModal({state,update,item,reviewType,projectId,courseId,onClose}){
  const typeId = item?.type || reviewType || state.settings.reviewTypes[0].id;
  const typeMeta = state.settings.reviewTypes.find(x => x.id === typeId) || state.settings.reviewTypes[0];

  const [form,setForm] = useState(item || {
    id:null,
    date:today(),
    type:typeId,
    title:"",
    phase:state.phase,
    week:state.week,
    score:0,
    strengths:"",
    weaknesses:"",
    nextGoal:"",
    verdict:"通过",
    refLogIds:[],
    refFlawIds:[],
    projectId:projectId || null,
    courseId:courseId || null
  });

  const filteredLogs = state.logs
    .filter(l => form.projectId ? l.projectId === form.projectId : true)
    .filter(l => form.courseId ? l.courseId === form.courseId : true)
    .sort((a,b)=>b.date.localeCompare(a.date))
    .slice(0,30);

  const filteredFlaws = state.flaws
    .filter(f => form.projectId ? f.projectId === form.projectId : true)
    .filter(f => form.courseId ? f.courseId === form.courseId : true)
    .sort((a,b)=>b.date.localeCompare(a.date))
    .slice(0,30);

  const save = () => {
    const next = {...form, id: form.id || uid("review")};
    if(item){
      update(s => ({...s, reviews:s.reviews.map(r => r.id===next.id ? next : r)}));
    }else{
      const payload = {...state, reviews:[...state.reviews, next]};
      if(next.type === "weekly" && next.verdict !== "重复"){
        payload.week = state.week + 1;
      }
      update(payload);
    }
    onClose();
  };

  return (
    <ModalShell title={`${typeMeta.icon} ${item ? "编辑" : "新建"}${typeMeta.label}`} onClose={onClose}>
      <div className="grid grid-3">
        <div className="field">
          <div className="field-label">日期</div>
          <input className="input" type="date" value={form.date} onChange={e=>setForm(prev=>({...prev,date:e.target.value}))} />
        </div>
        <div className="field">
          <div className="field-label">课程</div>
          <select className="select" value={form.courseId || ""} onChange={e=>setForm(prev=>({...prev,courseId:e.target.value || null}))}>
            <option value="">全部/未绑定</option>
            {state.courses.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        <div className="field">
          <div className="field-label">项目</div>
          <select className="select" value={form.projectId || ""} onChange={e=>setForm(prev=>({...prev,projectId:e.target.value || null}))}>
            <option value="">全部/未绑定</option>
            {state.projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        </div>
      </div>

      <div className="field">
        <div className="field-label">标题</div>
        <input className="input" value={form.title} onChange={e=>setForm(prev=>({...prev,title:e.target.value}))} placeholder={`${typeMeta.label} · ${today()}`} />
      </div>

      <div className="field">
        <div className="field-label">评分（可选）</div>
        <input className="input" type="number" value={form.score} onChange={e=>setForm(prev=>({...prev,score:Number(e.target.value || 0)}))} />
      </div>

      <div className="field">
        <div className="field-label">亮点</div>
        <textarea className="textarea" rows="3" value={form.strengths} onChange={e=>setForm(prev=>({...prev,strengths:e.target.value}))} placeholder="真实进步是什么？不是感觉好，而是具体能力改进。" />
      </div>

      <div className="field">
        <div className="field-label">薄弱点</div>
        <textarea className="textarea" rows="3" value={form.weaknesses} onChange={e=>setForm(prev=>({...prev,weaknesses:e.target.value}))} placeholder="哪里仍然脆弱？反驳时哪一步容易崩？" />
      </div>

      <div className="field">
        <div className="field-label">下一步</div>
        <textarea className="textarea" rows="3" value={form.nextGoal} onChange={e=>setForm(prev=>({...prev,nextGoal:e.target.value}))} placeholder="下一轮训练要具体做什么？" />
      </div>

      <div className="field">
        <div className="field-label">判定</div>
        <div className="btn-row">
          {["通过","重复","需强化"].map(v => (
            <button
              key={v}
              className="chip"
              style={{
                cursor:"pointer",
                color: form.verdict === v ? (v==="通过" ? "#16a34a" : v==="重复" ? "#d97706" : "#dc2626") : "#64748b",
                borderColor: form.verdict === v ? (v==="通过" ? "#86efac" : v==="重复" ? "#fcd34d" : "#fca5a5") : "#e2e8f0",
                background: form.verdict === v ? (v==="通过" ? "#f0fdf4" : v==="重复" ? "#fffbeb" : "#fef2f2") : "#fff"
              }}
              onClick={()=>setForm(prev=>({...prev, verdict:v}))}
            >
              {v}
            </button>
          ))}
        </div>
      </div>

      <div className="field">
        <div className="field-label">关联日志</div>
        <div className="card" style={{maxHeight:180, overflow:"auto", padding:10}}>
          {filteredLogs.length === 0 ? <Empty text="暂无可选日志" /> : filteredLogs.map(log => {
            const checked = ensureArray(form.refLogIds).includes(log.id);
            return (
              <label key={log.id} className="list-row" style={{cursor:"pointer"}}>
                <input type="checkbox" checked={checked} onChange={()=>{
                  setForm(prev => ({
                    ...prev,
                    refLogIds: checked ? prev.refLogIds.filter(x => x !== log.id) : prev.refLogIds.concat(log.id)
                  }));
                }} />
                <div style={{flex:1}}>
                  <div className="small">{log.date} · {log.minutes} 分钟 · {scoreAvg(log.scores, state.settings.scoreDims)} 分</div>
                  {log.notes && <div className="tiny">{log.notes.slice(0,100)}</div>}
                </div>
              </label>
            );
          })}
        </div>
      </div>

      <div className="field">
        <div className="field-label">关联缺陷</div>
        <div className="card" style={{maxHeight:160, overflow:"auto", padding:10}}>
          {filteredFlaws.length === 0 ? <Empty text="暂无可选缺陷" /> : filteredFlaws.map(flaw => {
            const checked = ensureArray(form.refFlawIds).includes(flaw.id);
            return (
              <label key={flaw.id} className="list-row" style={{cursor:"pointer"}}>
                <input type="checkbox" checked={checked} onChange={()=>{
                  setForm(prev => ({
                    ...prev,
                    refFlawIds: checked ? prev.refFlawIds.filter(x => x !== flaw.id) : prev.refFlawIds.concat(flaw.id)
                  }));
                }} />
                <div style={{flex:1}}>
                  <div className="small">{flaw.type}</div>
                  <div className="tiny">{flaw.description.slice(0,100)}</div>
                </div>
              </label>
            );
          })}
        </div>
      </div>

      <div className="btn-row">
        <GhostButton label="取消" onClick={onClose} />
        <PrimaryButton label={item ? "保存修改" : "保存复盘"} onClick={save} />
      </div>
    </ModalShell>
  );
}

function FlawModal({state,update,item,projectId,courseId,onClose}){
  const [form,setForm] = useState(item || {
    id:null,
    date:today(),
    type: state.settings.flawTypes[0] || "其他",
    description:"",
    resolved:false,
    resolvedDate:null,
    projectId: projectId || null,
    courseId: courseId || null,
    sourceLogId:null,
    sourceTaskId:null,
    sourcePlanDate:null
  });

  const save = () => {
    if(!form.description.trim()) return;
    const next = {...form, id: form.id || uid("flaw")};
    if(item){
      update(s => ({...s, flaws:s.flaws.map(f => f.id===next.id ? next : f)}));
    }else{
      update(s => ({...s, flaws:[...s.flaws, next]}));
    }
    onClose();
  };

  return (
    <ModalShell title={item ? "编辑缺陷" : "新建缺陷"} onClose={onClose}>
      <div className="danger-zone small" style={{marginBottom:12, lineHeight:1.7}}>
        不要写“我逻辑一般”。<br/>
        要写“在论证 X 时，我把词 Y 用了两种含义，导致前提 2 和结论之间出现偷换”。<br/>
        只接受可复现、可检测、可修正的描述。
      </div>

      <div className="grid grid-3">
        <div className="field">
          <div className="field-label">日期</div>
          <input className="input" type="date" value={form.date} onChange={e=>setForm(prev=>({...prev,date:e.target.value}))} />
        </div>
        <div className="field">
          <div className="field-label">课程</div>
          <select className="select" value={form.courseId || ""} onChange={e=>setForm(prev=>({...prev,courseId:e.target.value || null}))}>
            <option value="">未绑定课程</option>
            {state.courses.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        <div className="field">
          <div className="field-label">项目</div>
          <select className="select" value={form.projectId || ""} onChange={e=>setForm(prev=>({...prev,projectId:e.target.value || null}))}>
            <option value="">未绑定项目</option>
            {state.projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        </div>
      </div>

      <div className="field">
        <div className="field-label">缺陷类型</div>
        <select className="select" value={form.type} onChange={e=>setForm(prev=>({...prev,type:e.target.value}))}>
          {state.settings.flawTypes.map(x => <option key={x} value={x}>{x}</option>)}
        </select>
      </div>

      <div className="field">
        <div className="field-label">具体描述</div>
        <textarea className="textarea" rows="5" value={form.description} onChange={e=>setForm(prev=>({...prev,description:e.target.value}))} placeholder="准确写出：错在什么步骤、为什么错、如何设计下次检验。" />
      </div>

      <div className="btn-row">
        <GhostButton label="取消" onClick={onClose} />
        <PrimaryButton label={item ? "保存修改" : "保存缺陷"} onClick={save} />
      </div>
    </ModalShell>
  );
}

function GateModal({state,update,targetPhase,onClose}){
  const dims = state.settings.gateDims;
  const [scores,setScores] = useState(emptyScoreMap(dims, 70));
  const [evidence,setEvidence] = useState("");
  const avgValue = gateAvg(scores, dims);
  const passed = avgValue >= 80;

  const save = () => {
    update(s => {
      const next = {
        ...s,
        gateScores:{
          ...s.gateScores,
          [targetPhase]: avgValue
        }
      };
      if(passed && Number(targetPhase) === Number(s.phase) && s.phase < 4){
        next.phase = s.phase + 1;
        next.week = 1;
      }
      return next;
    });
    onClose();
  };

  return (
    <ModalShell title={`Phase ${targetPhase} Gate`} onClose={onClose}>
      <div className="blue-zone small" style={{marginBottom:12,lineHeight:1.7}}>
        {PROGRAM_PHASES[targetPhase].gate}
      </div>

      <div className="grid grid-2">
        {dims.map(dim => (
          <div key={dim.id} className="card" style={{padding:10}}>
            <div className="row-between" style={{marginBottom:6}}>
              <div className="small" style={{fontWeight:700}}>{dim.label}</div>
              <div className="small" style={{color:scoreColor(Number(scores[dim.id] ?? 70)), fontWeight:700}}>{Number(scores[dim.id] ?? 70)}</div>
            </div>
            <div className="tiny" style={{marginBottom:8}}>{dim.desc}</div>
            <input
              type="range"
              min="0"
              max="100"
              value={Number(scores[dim.id] ?? 70)}
              style={{width:"100%", accentColor:scoreColor(Number(scores[dim.id] ?? 70))}}
              onChange={e=>setScores(prev=>({...prev, [dim.id]:Number(e.target.value)}))}
            />
          </div>
        ))}
      </div>

      <div style={{textAlign:"center", margin:"14px 0", fontSize:36, fontWeight:900, color:scoreColor(avgValue)}}>{avgValue}</div>
      <div className={passed ? "good-zone small" : "danger-zone small"} style={{marginBottom:12}}>
        {passed ? "✓ 通过：如果这是当前阶段，会自动进入下一阶段。" : "✗ 未达到 80 分，不进入下一阶段。"}
      </div>

      <div className="field">
        <div className="field-label">证据备忘</div>
        <textarea className="textarea" rows="4" value={evidence} onChange={e=>setEvidence(e.target.value)} placeholder="写下这次 Gate 的证据：哪次答辩、哪篇文章、哪次修订证明了这些分数。" />
      </div>

      <div className="btn-row">
        <GhostButton label="取消" onClick={onClose} />
        <PrimaryButton label={passed ? "确认通过" : "记录未通过"} onClick={save} style={{background:passed ? "#16a34a" : "#dc2626", borderColor:passed ? "#16a34a" : "#dc2626"}} />
      </div>
    </ModalShell>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
